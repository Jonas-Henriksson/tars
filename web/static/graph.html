<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS Graph</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1"></script>
    <script src="https://unpkg.com/3d-force-graph@1"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #111113; --surface-raised: #18181b;
            --border: #27272a; --border-subtle: #1e1e21;
            --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
            --accent: #3b82f6; --green: #22c55e; --green-dim: rgba(34,197,94,0.12); --green-text: #4ade80;
            --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.10); --amber-text: #fbbf24;
            --red: #ef4444; --red-dim: rgba(239,68,68,0.10); --red-text: #f87171;
            --blue-dim: rgba(59,130,246,0.10); --purple: #a855f7; --purple-dim: rgba(168,85,247,0.10); --purple-text: #c084fc;
            --node-person: #3b82f6; --node-topic: #a855f7; --node-page: #f59e0b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh; }
        header { border-bottom: 1px solid var(--border-subtle); padding: 12px 24px; position: sticky; top: 0; background: var(--bg); z-index: 50; }
        .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; max-width: 1400px; margin: 0 auto; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
        .brand span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
        .nav-links a:hover { color: var(--text-secondary); background: var(--surface); }
        .nav-links a.active { color: var(--text); background: var(--surface-raised); }

        /* Control Panel */
        .ctrl-panel { position: absolute; top: 12px; right: 12px; width: 280px; z-index: 40; background: rgba(17,17,19,0.92); border: 1px solid var(--border); border-radius: 10px; backdrop-filter: blur(12px); max-height: calc(100vh - 120px); overflow-y: auto; }
        .ctrl-panel::-webkit-scrollbar { width: 4px; }
        .ctrl-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .ctrl-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
        .ctrl-header-actions { display: flex; gap: 6px; }
        .ctrl-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 14px; line-height: 1; }
        .ctrl-btn:hover { color: var(--text); background: var(--surface-raised); }
        .ctrl-section { border-bottom: 1px solid var(--border-subtle); }
        .ctrl-section:last-child { border-bottom: none; }
        .ctrl-section-head { display: flex; align-items: center; gap: 6px; padding: 10px 14px; cursor: pointer; user-select: none; font-size: 13px; font-weight: 600; }
        .ctrl-section-head:hover { background: rgba(255,255,255,0.02); }
        .ctrl-section-head .chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
        .ctrl-section-head .chevron.open { transform: rotate(90deg); }
        .ctrl-section-body { padding: 0 14px 12px; display: none; }
        .ctrl-section-body.open { display: block; }

        /* Search within panel */
        .ctrl-search { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 12px; font-family: inherit; outline: none; margin-bottom: 8px; }
        .ctrl-search:focus { border-color: var(--accent); }
        .ctrl-search::placeholder { color: var(--text-muted); }

        /* Groups */
        .ctrl-group-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
        .ctrl-group-row:last-child { border-bottom: none; }
        .ctrl-group-name { flex: 1; font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ctrl-group-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .ctrl-group-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 3px; line-height: 1; }
        .ctrl-group-toggle:hover { color: var(--text); background: var(--surface-raised); }
        .ctrl-group-toggle.hidden { opacity: 0.4; }

        /* Display toggles */
        .ctrl-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
        .ctrl-toggle-label { font-size: 12px; color: var(--text-secondary); }
        .ctrl-switch { position: relative; width: 32px; height: 18px; cursor: pointer; }
        .ctrl-switch input { opacity: 0; width: 0; height: 0; }
        .ctrl-switch .slider { position: absolute; inset: 0; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 9px; transition: background 0.2s; }
        .ctrl-switch .slider::before { content: ''; position: absolute; width: 12px; height: 12px; left: 2px; top: 2px; background: var(--text-muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
        .ctrl-switch input:checked + .slider { background: var(--accent); border-color: var(--accent); }
        .ctrl-switch input:checked + .slider::before { transform: translateX(14px); background: #fff; }

        /* Force sliders */
        .ctrl-slider-row { margin-bottom: 10px; }
        .ctrl-slider-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: flex; justify-content: space-between; }
        .ctrl-slider-val { color: var(--text-muted); font-size: 11px; }
        .ctrl-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--surface-raised); outline: none; }
        .ctrl-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid var(--border); }
        .ctrl-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid var(--border); }

        /* Main layout */
        .graph-wrap { display: flex; height: calc(100vh - 50px); position: relative; }
        #graph3d { flex: 1; }
        #graph3d canvas { display: block; }

        /* Sidebar */
        .sidebar { width: 0; overflow: hidden; border-left: 1px solid var(--border-subtle); background: var(--surface); transition: width 0.25s ease; flex-shrink: 0; z-index: 30; }
        .sidebar.open { width: 340px; }
        .sidebar-inner { width: 340px; padding: 20px; overflow-y: auto; height: 100%; }
        .sidebar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .sidebar-title { font-size: 16px; font-weight: 600; }
        .sidebar-type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 8px; border-radius: 4px; }
        .sidebar-type.person { background: rgba(59,130,246,0.15); color: var(--node-person); }
        .sidebar-type.topic { background: var(--purple-dim); color: var(--purple-text); }
        .sidebar-type.page { background: var(--amber-dim); color: var(--amber-text); }
        .sidebar-close { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
        .sidebar-close:hover { color: var(--text); background: var(--surface-raised); }
        .sidebar-section { margin-bottom: 18px; }
        .sidebar-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
        .sidebar-item { padding: 6px 0; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: flex-start; gap: 8px; }
        .sidebar-item:last-child { border-bottom: none; }
        .sidebar-item a { color: var(--accent); text-decoration: none; }
        .sidebar-item a:hover { text-decoration: underline; }
        .sidebar-task { padding: 8px 10px; background: var(--surface-raised); border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
        .sidebar-task-desc { color: var(--text); margin-bottom: 4px; }
        .sidebar-task-meta { color: var(--text-muted); font-size: 11px; display: flex; gap: 8px; }
        .sidebar-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
        .sidebar-badge.q1 { background: var(--red-dim); color: var(--red-text); }
        .sidebar-badge.q2 { background: var(--blue-dim); color: var(--accent); }
        .sidebar-badge.q3 { background: var(--amber-dim); color: var(--amber-text); }
        .sidebar-badge.q4 { background: rgba(113,113,122,0.15); color: var(--text-muted); }
        .sidebar-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px 2px; }
        .sidebar-tag.person { background: rgba(59,130,246,0.12); color: var(--node-person); }
        .sidebar-tag.topic { background: var(--purple-dim); color: var(--purple-text); }
        .sidebar-tag.page { background: var(--amber-dim); color: var(--amber-text); }
        .sidebar-empty { color: var(--text-muted); font-size: 12px; font-style: italic; padding: 4px 0; }
        .sidebar-page-link { display: flex; align-items: center; gap: 6px; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border-subtle); }
        .sidebar-page-link:last-child { border-bottom: none; }
        .sidebar-page-link a { color: var(--accent); text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-page-link a:hover { text-decoration: underline; }

        /* Node label overlay */
        .node-label { color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,0.6); white-space: nowrap; pointer-events: none; }

        /* Legend */
        .legend { position: absolute; bottom: 16px; left: 16px; display: flex; gap: 14px; z-index: 20; background: rgba(10,10,10,0.7); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-subtle); backdrop-filter: blur(8px); }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

        @media (max-width: 768px) {
            .sidebar.open { width: 280px; }
            .sidebar-inner { width: 280px; }
            .search-box { width: 120px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-row">
            <div class="brand"><h1>TARS</h1><span>Graph</span></div>
            <nav class="nav-links">
                <a href="/">Voice</a>
                <a href="/tasks">Tasks</a>
                <a href="/briefing">Briefing</a>
                <a href="/executive">Executive</a>
                <a href="/graph" class="active">Graph</a>
            </nav>
        </div>
    </header>

    <div class="graph-wrap">
        <div id="graph3d"></div>

        <!-- Control Panel -->
        <div class="ctrl-panel" id="ctrlPanel">
            <div class="ctrl-header">
                <span style="font-size:13px;font-weight:600;">Graph Controls</span>
                <div class="ctrl-header-actions">
                    <button class="ctrl-btn" id="ctrlReset" title="Reset defaults">&#8635;</button>
                    <button class="ctrl-btn" id="ctrlClose" title="Close panel">&#215;</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="ctrl-section">
                <div class="ctrl-section-head" data-section="filters">
                    <span class="chevron open">&#9656;</span> Filters
                </div>
                <div class="ctrl-section-body open" id="filtersBody">
                    <input type="text" class="ctrl-search" id="searchBox" placeholder="Search nodes...">
                    <div class="ctrl-toggle-row">
                        <span class="ctrl-toggle-label">Orphan nodes</span>
                        <label class="ctrl-switch"><input type="checkbox" id="toggleOrphans" checked><span class="slider"></span></label>
                    </div>
                </div>
            </div>

            <!-- Groups -->
            <div class="ctrl-section">
                <div class="ctrl-section-head" data-section="groups">
                    <span class="chevron open">&#9656;</span> Groups
                </div>
                <div class="ctrl-section-body open" id="groupsBody">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Display -->
            <div class="ctrl-section">
                <div class="ctrl-section-head" data-section="display">
                    <span class="chevron">&#9656;</span> Display
                </div>
                <div class="ctrl-section-body" id="displayBody">
                    <div class="ctrl-toggle-row">
                        <span class="ctrl-toggle-label">Labels</span>
                        <label class="ctrl-switch"><input type="checkbox" id="toggleLabels" checked><span class="slider"></span></label>
                    </div>
                    <div class="ctrl-toggle-row">
                        <span class="ctrl-toggle-label">Arrows</span>
                        <label class="ctrl-switch"><input type="checkbox" id="toggleArrows"><span class="slider"></span></label>
                    </div>
                    <div class="ctrl-slider-row" style="margin-top:8px">
                        <div class="ctrl-slider-label">Node size <span class="ctrl-slider-val" id="nodeSizeVal">1.0</span></div>
                        <input type="range" class="ctrl-slider" id="nodeSize" min="0.2" max="3" step="0.1" value="1">
                    </div>
                    <div class="ctrl-slider-row">
                        <div class="ctrl-slider-label">Link thickness <span class="ctrl-slider-val" id="linkThicknessVal">1.0</span></div>
                        <input type="range" class="ctrl-slider" id="linkThickness" min="0.1" max="3" step="0.1" value="1">
                    </div>
                    <div class="ctrl-slider-row">
                        <div class="ctrl-slider-label">Link opacity <span class="ctrl-slider-val" id="linkOpacityVal">0.15</span></div>
                        <input type="range" class="ctrl-slider" id="linkOpacity" min="0.01" max="0.6" step="0.01" value="0.15">
                    </div>
                </div>
            </div>

            <!-- Forces -->
            <div class="ctrl-section">
                <div class="ctrl-section-head" data-section="forces">
                    <span class="chevron open">&#9656;</span> Forces
                </div>
                <div class="ctrl-section-body open" id="forcesBody">
                    <div class="ctrl-slider-row">
                        <div class="ctrl-slider-label">Center force <span class="ctrl-slider-val" id="centerForceVal">0.05</span></div>
                        <input type="range" class="ctrl-slider" id="centerForce" min="0" max="0.3" step="0.005" value="0.05">
                    </div>
                    <div class="ctrl-slider-row">
                        <div class="ctrl-slider-label">Repel force <span class="ctrl-slider-val" id="repelForceVal">80</span></div>
                        <input type="range" class="ctrl-slider" id="repelForce" min="0" max="300" step="5" value="80">
                    </div>
                    <div class="ctrl-slider-row">
                        <div class="ctrl-slider-label">Link force <span class="ctrl-slider-val" id="linkForceVal">1.0</span></div>
                        <input type="range" class="ctrl-slider" id="linkForce" min="0" max="2" step="0.05" value="1">
                    </div>
                    <div class="ctrl-slider-row">
                        <div class="ctrl-slider-label">Link distance <span class="ctrl-slider-val" id="linkDistanceVal">60</span></div>
                        <input type="range" class="ctrl-slider" id="linkDistance" min="10" max="200" step="5" value="60">
                    </div>
                </div>
            </div>
        </div>

        <!-- Toggle button when panel is closed -->
        <button class="ctrl-btn" id="ctrlOpen" title="Open controls" style="position:absolute;top:12px;right:12px;z-index:39;background:rgba(17,17,19,0.85);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:16px;display:none;">&#9881;</button>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-inner" id="sidebarContent"></div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // --- State ---
        let graphData = null;
        let graphNodes = [];
        let graphEdges = [];
        let tasks = [];
        let nodeMap = {};
        let adjacency = {};
        let selectedNodeId = null;
        let hoveredNodeId = null;
        let Graph = null;

        // Display settings
        let showLabels = true;
        let showArrows = false;
        let nodeSizeMul = 1;
        let linkThicknessMul = 1;
        let baseLinkOpacity = 0.15;

        // Force settings
        let forceCenter = 0.05;
        let forceRepel = 80;
        let forceLink = 1;
        let forceLinkDist = 60;

        // Group visibility
        let groupVisible = { person: true, topic: true, page: false };

        const sidebar = document.getElementById('sidebar');
        const sidebarContent = document.getElementById('sidebarContent');
        const searchBox = document.getElementById('searchBox');
        const graphEl = document.getElementById('graph3d');
        const ctrlPanel = document.getElementById('ctrlPanel');
        const groupsBody = document.getElementById('groupsBody');

        const NODE_COLORS = { person: '#3b82f6', topic: '#a855f7', page: '#f59e0b' };
        const NODE_COLORS_HIGHLIGHT = { person: '#60a5fa', topic: '#c084fc', page: '#fbbf24' };

        // --- Control Panel: collapsible sections ---
        document.querySelectorAll('.ctrl-section-head').forEach(head => {
            head.addEventListener('click', () => {
                const chevron = head.querySelector('.chevron');
                const body = head.nextElementSibling;
                const isOpen = body.classList.contains('open');
                body.classList.toggle('open', !isOpen);
                chevron.classList.toggle('open', !isOpen);
            });
        });

        // Panel open/close
        document.getElementById('ctrlClose').addEventListener('click', () => {
            ctrlPanel.style.display = 'none';
            document.getElementById('ctrlOpen').style.display = 'block';
        });
        document.getElementById('ctrlOpen').addEventListener('click', () => {
            ctrlPanel.style.display = '';
            document.getElementById('ctrlOpen').style.display = 'none';
        });

        // --- Load data ---
        async function loadGraph() {
            try {
                const resp = await fetch('/api/intel/graph');
                if (!resp.ok) return;
                graphData = await resp.json();
                tasks = graphData.tasks || [];
                initGraph(graphData);
            } catch(e) {
                console.error('Failed to load graph', e);
            }
        }

        function initGraph(data) {
            graphNodes = [];
            graphEdges = [];
            nodeMap = {};
            adjacency = {};

            const weightsByType = { person: [], topic: [], page: [] };
            for (const n of data.nodes) {
                if (weightsByType[n.type]) weightsByType[n.type].push(n.weight || 1);
            }
            const maxWeight = {};
            for (const t of ['person', 'topic', 'page']) {
                maxWeight[t] = Math.max(1, ...weightsByType[t]);
            }
            const sizeRange = { person: [3, 10], topic: [4, 14], page: [2, 6] };

            for (const n of data.nodes) {
                const weight = n.weight || 1;
                const type = n.type;
                const [sMin, sMax] = sizeRange[type] || [3, 8];
                const norm = Math.log(1 + weight) / Math.log(1 + maxWeight[type]);
                const size = sMin + norm * (sMax - sMin);

                const node = {
                    id: n.id,
                    label: n.label,
                    type: type,
                    weight: weight,
                    url: n.url || '',
                    baseVal: size,
                    val: size * nodeSizeMul,
                    color: NODE_COLORS[type] || '#71717a',
                    visible: groupVisible[type] !== false,
                };
                graphNodes.push(node);
                nodeMap[n.id] = node;
                adjacency[n.id] = new Set();
            }

            for (const e of data.edges) {
                if (nodeMap[e.source] && nodeMap[e.target]) {
                    graphEdges.push({
                        source: e.source,
                        target: e.target,
                        type: e.type,
                        weight: e.weight || 1,
                    });
                    adjacency[e.source].add(e.target);
                    adjacency[e.target].add(e.source);
                }
            }

            buildGroups();
            createGraph();
        }

        // --- Groups panel ---
        function buildGroups() {
            const groups = [
                { key: 'person', label: 'People', color: NODE_COLORS.person, count: graphNodes.filter(n => n.type === 'person').length },
                { key: 'topic', label: 'Topics', color: NODE_COLORS.topic, count: graphNodes.filter(n => n.type === 'topic').length },
                { key: 'page', label: 'Pages', color: NODE_COLORS.page, count: graphNodes.filter(n => n.type === 'page').length },
            ];

            let html = '';
            for (const g of groups) {
                const vis = groupVisible[g.key] !== false;
                html += '<div class="ctrl-group-row">';
                html += '<span class="ctrl-group-name">' + esc(g.label) + ' <span style="color:var(--text-muted);font-size:11px">(' + g.count + ')</span></span>';
                html += '<div class="ctrl-group-dot" style="background:' + g.color + (vis ? '' : ';opacity:0.2') + '"></div>';
                html += '<button class="ctrl-group-toggle' + (vis ? '' : ' hidden') + '" data-group="' + g.key + '" title="Toggle visibility">' + (vis ? '&#10003;' : '&#10005;') + '</button>';
                html += '</div>';
            }
            groupsBody.innerHTML = html;

            groupsBody.querySelectorAll('.ctrl-group-toggle').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.dataset.group;
                    groupVisible[key] = !groupVisible[key];
                    applyGroupVisibility();
                    buildGroups();
                });
            });
        }

        function applyGroupVisibility() {
            let showOrphans = document.getElementById('toggleOrphans').checked;
            for (const n of graphNodes) {
                n.visible = groupVisible[n.type] !== false;
                if (n.visible && !showOrphans && (adjacency[n.id] || new Set()).size === 0) {
                    n.visible = false;
                }
            }
            updateGraphData();
        }

        function getVisibleData() {
            const visibleNodes = graphNodes.filter(n => n.visible);
            const visibleIds = new Set(visibleNodes.map(n => n.id));
            const visibleEdges = graphEdges.filter(e => {
                const sid = typeof e.source === 'object' ? e.source.id : e.source;
                const tid = typeof e.target === 'object' ? e.target.id : e.target;
                return visibleIds.has(sid) && visibleIds.has(tid);
            });
            return { nodes: visibleNodes, links: visibleEdges };
        }

        function updateGraphData() {
            if (!Graph) return;
            const data = getVisibleData();
            Graph.graphData(data);
        }

        function createGraph() {
            const data = getVisibleData();

            const graphWrap = document.querySelector('.graph-wrap');
            const sidebarW = sidebar.classList.contains('open') ? 340 : 0;
            const width = graphWrap.clientWidth - sidebarW;
            const height = graphWrap.clientHeight;

            if (Graph) {
                Graph.graphData(data).width(width).height(height);
                return;
            }

            Graph = ForceGraph3D()(graphEl)
                .width(width)
                .height(height)
                .backgroundColor('#0a0a0a')
                .graphData(data)

                .nodeVal(n => n.baseVal * nodeSizeMul)
                .nodeColor(n => {
                    if (selectedNodeId && n.id !== selectedNodeId && !adjacency[selectedNodeId].has(n.id)) {
                        return 'rgba(60,60,70,0.3)';
                    }
                    if (n.id === hoveredNodeId || n.id === selectedNodeId) {
                        return NODE_COLORS_HIGHLIGHT[n.type] || '#aaa';
                    }
                    return n.color;
                })
                .nodeOpacity(0.9)
                .nodeResolution(20)

                .nodeLabel(n => '<div class="node-label">' + esc(n.label) + ' <span style="opacity:0.5;font-size:10px">' + n.type + '</span></div>')
                .nodeThreeObject(n => {
                    if (!showLabels || typeof SpriteText === 'undefined') return null;
                    const sprite = new SpriteText(n.label);
                    sprite.color = '#ffffff';
                    sprite.textHeight = 2.5;
                    sprite.fontFace = '-apple-system, BlinkMacSystemFont, sans-serif';
                    sprite.fontWeight = '500';
                    sprite.backgroundColor = false;
                    sprite.padding = 1;
                    const nodeRadius = Math.cbrt(n.baseVal * nodeSizeMul) * 2;
                    sprite.position.y = nodeRadius + 3;
                    return sprite;
                })
                .nodeThreeObjectExtend(true)

                .linkWidth(e => Math.min(2, 0.2 + e.weight * 0.15) * linkThicknessMul)
                .linkOpacity(baseLinkOpacity)
                .linkColor(e => {
                    const sid = typeof e.source === 'object' ? e.source.id : e.source;
                    const tid = typeof e.target === 'object' ? e.target.id : e.target;
                    if (selectedNodeId) {
                        if (sid === selectedNodeId || tid === selectedNodeId) {
                            return NODE_COLORS[nodeMap[sid] ? nodeMap[sid].type : 'person'];
                        }
                        return 'rgba(40,40,50,0.1)';
                    }
                    return nodeMap[sid] ? nodeMap[sid].color : '#555';
                })
                .linkDirectionalArrowLength(showArrows ? 4 : 0)
                .linkDirectionalArrowRelPos(1)
                .linkDirectionalParticles(e => {
                    const sid = typeof e.source === 'object' ? e.source.id : e.source;
                    const tid = typeof e.target === 'object' ? e.target.id : e.target;
                    if (selectedNodeId && (sid === selectedNodeId || tid === selectedNodeId)) return 2;
                    return 0;
                })
                .linkDirectionalParticleWidth(1.2)
                .linkDirectionalParticleSpeed(0.006)
                .linkDirectionalParticleColor(e => {
                    const sid = typeof e.source === 'object' ? e.source.id : e.source;
                    return nodeMap[sid] ? NODE_COLORS_HIGHLIGHT[nodeMap[sid].type] : '#fff';
                })
                .linkCurvature(0.15)
                .linkCurveRotation(0.5)

                .onNodeClick(n => selectNode(n.id))
                .onNodeHover(n => {
                    hoveredNodeId = n ? n.id : null;
                    graphEl.style.cursor = n ? 'pointer' : 'default';
                })
                .onBackgroundClick(() => {
                    selectedNodeId = null;
                    closeSidebar();
                    resetPageVisibility();
                    refreshGraph();
                })

                .d3AlphaDecay(0.02)
                .d3VelocityDecay(0.3);

            // Force config
            applyForces();

            // Bloom
            addBloomEffect();
        }

        function applyForces() {
            if (!Graph) return;
            Graph.d3Force('charge').strength(n => -forceRepel * (n.baseVal || 4));
            Graph.d3Force('link').distance(e => forceLinkDist + (e.weight || 1) * 5).strength(forceLink > 0 ? forceLink * 0.05 : 0);
            Graph.d3Force('center').strength(forceCenter);
            // Reheat simulation
            Graph.d3ReheatSimulation();
        }

        function addBloomEffect() {
            if (!Graph) return;
            const renderer = Graph.renderer();
            const scene = Graph.scene();
            const camera = Graph.camera();

            import('https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js').then(({ EffectComposer }) => {
                return Promise.all([
                    Promise.resolve(EffectComposer),
                    import('https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js'),
                    import('https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js'),
                ]);
            }).then(([EffectComposer, { RenderPass }, { UnrealBloomPass }]) => {
                const composer = new EffectComposer(renderer);
                composer.addPass(new RenderPass(scene, camera));
                const bloomPass = new UnrealBloomPass(
                    { x: window.innerWidth, y: window.innerHeight },
                    1.2, 0.4, 0.85
                );
                composer.addPass(bloomPass);
                Graph.postProcessingComposer(composer);
            }).catch(e => {
                console.log('Bloom not available:', e.message);
            });
        }

        function refreshGraph() {
            if (!Graph) return;
            Graph.nodeColor(Graph.nodeColor());
            Graph.linkColor(Graph.linkColor());
            Graph.linkDirectionalParticles(Graph.linkDirectionalParticles());
            Graph.linkOpacity(e => {
                const sid = typeof e.source === 'object' ? e.source.id : e.source;
                const tid = typeof e.target === 'object' ? e.target.id : e.target;
                if (selectedNodeId) {
                    return (sid === selectedNodeId || tid === selectedNodeId) ? 0.6 : 0.04;
                }
                return baseLinkOpacity;
            });
        }

        // --- Control Panel: Force sliders ---
        function bindSlider(id, valId, setter) {
            const slider = document.getElementById(id);
            const valEl = document.getElementById(valId);
            slider.addEventListener('input', () => {
                const v = parseFloat(slider.value);
                valEl.textContent = v.toFixed(v < 1 ? 2 : (v < 10 ? 1 : 0));
                setter(v);
            });
        }

        bindSlider('centerForce', 'centerForceVal', v => { forceCenter = v; applyForces(); });
        bindSlider('repelForce', 'repelForceVal', v => { forceRepel = v; applyForces(); });
        bindSlider('linkForce', 'linkForceVal', v => { forceLink = v; applyForces(); });
        bindSlider('linkDistance', 'linkDistanceVal', v => { forceLinkDist = v; applyForces(); });

        // Display sliders
        bindSlider('nodeSize', 'nodeSizeVal', v => {
            nodeSizeMul = v;
            if (Graph) {
                Graph.nodeVal(n => n.baseVal * nodeSizeMul);
                Graph.nodeThreeObject(Graph.nodeThreeObject()); // refresh labels
            }
        });
        bindSlider('linkThickness', 'linkThicknessVal', v => {
            linkThicknessMul = v;
            if (Graph) Graph.linkWidth(e => Math.min(2, 0.2 + e.weight * 0.15) * linkThicknessMul);
        });
        bindSlider('linkOpacity', 'linkOpacityVal', v => {
            baseLinkOpacity = v;
            if (Graph) Graph.linkOpacity(v);
        });

        // Display toggles
        document.getElementById('toggleLabels').addEventListener('change', (e) => {
            showLabels = e.target.checked;
            if (Graph) Graph.nodeThreeObject(Graph.nodeThreeObject()); // refresh
        });
        document.getElementById('toggleArrows').addEventListener('change', (e) => {
            showArrows = e.target.checked;
            if (Graph) Graph.linkDirectionalArrowLength(showArrows ? 4 : 0);
        });
        document.getElementById('toggleOrphans').addEventListener('change', () => {
            applyGroupVisibility();
        });

        // Reset button
        document.getElementById('ctrlReset').addEventListener('click', () => {
            // Reset all sliders
            const defaults = {
                centerForce: 0.05, repelForce: 80, linkForce: 1, linkDistance: 60,
                nodeSize: 1, linkThickness: 1, linkOpacity: 0.15
            };
            for (const [id, val] of Object.entries(defaults)) {
                const el = document.getElementById(id);
                if (el) { el.value = val; el.dispatchEvent(new Event('input')); }
            }
            // Reset toggles
            document.getElementById('toggleLabels').checked = true; showLabels = true;
            document.getElementById('toggleArrows').checked = false; showArrows = false;
            document.getElementById('toggleOrphans').checked = true;
            // Reset groups
            groupVisible = { person: true, topic: true, page: false };
            applyGroupVisibility();
            buildGroups();
            if (Graph) {
                Graph.linkDirectionalArrowLength(0);
                Graph.nodeThreeObject(Graph.nodeThreeObject());
            }
        });

        // --- Selection ---
        function selectNode(nodeId) {
            if (selectedNodeId === nodeId) {
                selectedNodeId = null;
                closeSidebar();
                resetPageVisibility();
            } else {
                selectedNodeId = nodeId;
                showConnectedPages(nodeId);
                openSidebar(nodeId);

                const node = nodeMap[nodeId];
                if (node && Graph) {
                    const distance = 200;
                    const distRatio = 1 + distance / Math.hypot(node.x || 0, node.y || 0, node.z || 0);
                    Graph.cameraPosition(
                        { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
                        node,
                        1500
                    );
                }
            }
            refreshGraph();
        }

        function showConnectedPages(nodeId) {
            for (const n of graphNodes) {
                if (n.type === 'page') n.visible = false;
            }
            for (const neighborId of adjacency[nodeId] || []) {
                const neighbor = nodeMap[neighborId];
                if (neighbor && neighbor.type === 'page') {
                    neighbor.visible = true;
                }
            }
            updateGraphData();
        }

        function resetPageVisibility() {
            for (const n of graphNodes) {
                if (n.type === 'page') n.visible = groupVisible.page;
            }
            updateGraphData();
        }

        // --- Sidebar ---
        function openSidebar(nodeId) {
            const node = nodeMap[nodeId];
            if (!node) return;
            sidebar.classList.add('open');
            resizeGraph();

            let html = '<div class="sidebar-head">';
            html += '<div><div class="sidebar-title">' + esc(node.label) + '</div>';
            html += '<span class="sidebar-type ' + node.type + '">' + node.type + '</span></div>';
            html += '<button class="sidebar-close" onclick="closeSidebarGlobal()">&times;</button></div>';

            if (node.type === 'person') {
                html += renderPersonSidebar(nodeId, node);
            } else if (node.type === 'topic') {
                html += renderTopicSidebar(nodeId, node);
            } else if (node.type === 'page') {
                html += renderPageSidebar(nodeId, node);
            }

            sidebarContent.innerHTML = html;
        }

        function renderPersonSidebar(nodeId, node) {
            let html = '';
            const neighbors = Array.from(adjacency[nodeId] || []);
            const connTopics = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'topic').map(id => nodeMap[id]);
            const connPages = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'page').map(id => nodeMap[id]);
            const personTasks = tasks.filter(t => t.owner && t.owner.toLowerCase() === node.label.toLowerCase());

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Topics (' + connTopics.length + ')</div>';
            if (connTopics.length) {
                for (const t of connTopics.sort((a, b) => b.weight - a.weight)) {
                    html += '<span class="sidebar-tag topic">' + esc(t.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No connected topics</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Open Tasks (' + personTasks.length + ')</div>';
            if (personTasks.length) {
                for (const t of personTasks.sort((a, b) => (a.quadrant || 4) - (b.quadrant || 4))) {
                    html += renderTaskCard(t);
                }
            } else {
                html += '<div class="sidebar-empty">No open tasks</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Source Pages (' + connPages.length + ')</div>';
            if (connPages.length) {
                for (const p of connPages) {
                    html += renderPageLink(p);
                }
            } else {
                html += '<div class="sidebar-empty">No connected pages</div>';
            }
            html += '</div>';

            return html;
        }

        function renderTopicSidebar(nodeId, node) {
            let html = '';
            const neighbors = Array.from(adjacency[nodeId] || []);
            const connPeople = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'person').map(id => nodeMap[id]);
            const connPages = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'page').map(id => nodeMap[id]);
            const topicTasks = tasks.filter(t => t.topics && t.topics.includes(node.label));

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">People (' + connPeople.length + ')</div>';
            if (connPeople.length) {
                for (const p of connPeople.sort((a, b) => b.weight - a.weight)) {
                    html += '<span class="sidebar-tag person">' + esc(p.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No connected people</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Open Tasks (' + topicTasks.length + ')</div>';
            if (topicTasks.length) {
                for (const t of topicTasks.sort((a, b) => (a.quadrant || 4) - (b.quadrant || 4))) {
                    html += renderTaskCard(t);
                }
            } else {
                html += '<div class="sidebar-empty">No open tasks for this topic</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Source Pages (' + connPages.length + ')</div>';
            if (connPages.length) {
                for (const p of connPages) {
                    html += renderPageLink(p);
                }
            } else {
                html += '<div class="sidebar-empty">No connected pages</div>';
            }
            html += '</div>';

            return html;
        }

        function renderPageSidebar(nodeId, node) {
            let html = '';
            const neighbors = Array.from(adjacency[nodeId] || []);
            const connPeople = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'person').map(id => nodeMap[id]);
            const connTopics = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'topic').map(id => nodeMap[id]);

            if (node.url) {
                html += '<div class="sidebar-section">';
                html += '<a href="' + esc(node.url) + '" target="_blank" style="color:var(--accent);font-size:13px;">Open in Notion &rarr;</a>';
                html += '</div>';
            }

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">People (' + connPeople.length + ')</div>';
            if (connPeople.length) {
                for (const p of connPeople) {
                    html += '<span class="sidebar-tag person">' + esc(p.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No people mentioned</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Topics (' + connTopics.length + ')</div>';
            if (connTopics.length) {
                for (const t of connTopics) {
                    html += '<span class="sidebar-tag topic">' + esc(t.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No topics detected</div>';
            }
            html += '</div>';

            const pageId = node.id.replace('page:', '');
            const pageTasks = tasks.filter(t => t.source_page_id === pageId);
            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Tasks from this page (' + pageTasks.length + ')</div>';
            if (pageTasks.length) {
                for (const t of pageTasks) {
                    html += renderTaskCard(t);
                }
            } else {
                html += '<div class="sidebar-empty">No tasks extracted</div>';
            }
            html += '</div>';

            return html;
        }

        function renderTaskCard(t) {
            const qClass = 'q' + (t.quadrant || 4);
            let html = '<div class="sidebar-task">';
            html += '<div class="sidebar-task-desc">' + esc(t.description) + '</div>';
            html += '<div class="sidebar-task-meta">';
            html += '<span class="sidebar-badge ' + qClass + '">' + esc(t.quadrant_label || 'Defer') + '</span>';
            if (t.follow_up_date) html += '<span>' + t.follow_up_date + '</span>';
            if (t.owner) html += '<span>' + esc(t.owner) + '</span>';
            html += '</div></div>';
            return html;
        }

        function renderPageLink(p) {
            let html = '<div class="sidebar-page-link">';
            if (p.url) {
                html += '<a href="' + esc(p.url) + '" target="_blank">' + esc(p.label) + '</a>';
            } else {
                html += '<span style="color:var(--text-secondary)">' + esc(p.label) + '</span>';
            }
            html += '</div>';
            return html;
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            resizeGraph();
        }
        window.closeSidebarGlobal = closeSidebar;

        function resizeGraph() {
            if (!Graph) return;
            const graphWrap = document.querySelector('.graph-wrap');
            const sidebarW = sidebar.classList.contains('open') ? 340 : 0;
            Graph.width(graphWrap.clientWidth - sidebarW);
            Graph.height(graphWrap.clientHeight);
        }

        // --- Search ---
        searchBox.addEventListener('input', () => {
            const query = searchBox.value.trim().toLowerCase();
            if (!Graph) return;
            if (query) {
                Graph.nodeColor(n => {
                    if (n.label.toLowerCase().includes(query)) {
                        return NODE_COLORS_HIGHLIGHT[n.type] || '#fff';
                    }
                    return 'rgba(60,60,70,0.2)';
                });
                Graph.linkOpacity(() => 0.03);
            } else {
                selectedNodeId = null;
                Graph.nodeColor(n => n.color);
                Graph.linkOpacity(() => baseLinkOpacity);
            }
        });

        // --- Escape to deselect ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                selectedNodeId = null;
                closeSidebar();
                resetPageVisibility();
                searchBox.value = '';
                refreshGraph();
            }
        });

        // --- Resize ---
        const resizeObs = new ResizeObserver(() => resizeGraph());
        resizeObs.observe(document.querySelector('.graph-wrap'));
        window.addEventListener('resize', resizeGraph);

        // --- Utilities ---
        function esc(s) {
            if (!s) return '';
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }

        // --- Init ---
        loadGraph();
    })();
    </script>

</body>
</html>
