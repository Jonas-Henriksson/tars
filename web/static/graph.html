<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS Graph</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1"></script>
    <script src="https://unpkg.com/3d-force-graph@1"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #111113; --surface-raised: #18181b;
            --border: #27272a; --border-subtle: #1e1e21;
            --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
            --accent: #3b82f6; --green: #22c55e; --green-dim: rgba(34,197,94,0.12); --green-text: #4ade80;
            --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.10); --amber-text: #fbbf24;
            --red: #ef4444; --red-dim: rgba(239,68,68,0.10); --red-text: #f87171;
            --blue-dim: rgba(59,130,246,0.10); --purple: #a855f7; --purple-dim: rgba(168,85,247,0.10); --purple-text: #c084fc;
            --node-person: #3b82f6; --node-topic: #a855f7; --node-page: #f59e0b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh; }
        header { border-bottom: 1px solid var(--border-subtle); padding: 12px 24px; position: sticky; top: 0; background: var(--bg); z-index: 50; }
        .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; max-width: 1400px; margin: 0 auto; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
        .brand span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
        .nav-links a:hover { color: var(--text-secondary); background: var(--surface); }
        .nav-links a.active { color: var(--text); background: var(--surface-raised); }

        /* Toolbar */
        .toolbar { display: flex; align-items: flex-start; gap: 8px; padding: 10px 24px; border-bottom: 1px solid var(--border-subtle); background: var(--bg); max-width: 100%; flex-wrap: wrap; z-index: 40; position: relative; }
        .chip-groups { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; align-items: flex-start; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
        .chip-group + .chip-group { padding-left: 8px; border-left: 1px solid var(--border-subtle); }
        .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); color: var(--text-muted); background: transparent; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
        .chip:hover { border-color: var(--text-muted); color: var(--text-secondary); }
        .chip.active { border-color: var(--accent); color: var(--accent); background: var(--blue-dim); }
        .chip.person { border-color: var(--node-person); color: var(--node-person); }
        .chip.person.active { background: rgba(59,130,246,0.15); }
        .chip.topic { border-color: var(--node-topic); color: var(--node-topic); }
        .chip.topic.active { background: var(--purple-dim); }
        .chip.expand-toggle { border-color: var(--border); color: var(--text-muted); font-size: 11px; padding: 4px 10px; }
        .chip.expand-toggle:hover { border-color: var(--text-muted); color: var(--text-secondary); }
        .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
        .chip-dot.person { background: var(--node-person); }
        .chip-dot.topic { background: var(--node-topic); }
        .chip-dot.page { background: var(--node-page); }
        .search-box { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 12px; width: 180px; font-family: inherit; outline: none; transition: border-color 0.15s; flex-shrink: 0; }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-muted); }

        /* Main layout */
        .graph-wrap { display: flex; height: calc(100vh - 90px); position: relative; }
        #graph3d { flex: 1; }
        #graph3d canvas { display: block; }

        /* Sidebar */
        .sidebar { width: 0; overflow: hidden; border-left: 1px solid var(--border-subtle); background: var(--surface); transition: width 0.25s ease; flex-shrink: 0; z-index: 30; }
        .sidebar.open { width: 340px; }
        .sidebar-inner { width: 340px; padding: 20px; overflow-y: auto; height: 100%; }
        .sidebar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .sidebar-title { font-size: 16px; font-weight: 600; }
        .sidebar-type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 8px; border-radius: 4px; }
        .sidebar-type.person { background: rgba(59,130,246,0.15); color: var(--node-person); }
        .sidebar-type.topic { background: var(--purple-dim); color: var(--purple-text); }
        .sidebar-type.page { background: var(--amber-dim); color: var(--amber-text); }
        .sidebar-close { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
        .sidebar-close:hover { color: var(--text); background: var(--surface-raised); }
        .sidebar-section { margin-bottom: 18px; }
        .sidebar-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
        .sidebar-item { padding: 6px 0; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: flex-start; gap: 8px; }
        .sidebar-item:last-child { border-bottom: none; }
        .sidebar-item a { color: var(--accent); text-decoration: none; }
        .sidebar-item a:hover { text-decoration: underline; }
        .sidebar-task { padding: 8px 10px; background: var(--surface-raised); border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
        .sidebar-task-desc { color: var(--text); margin-bottom: 4px; }
        .sidebar-task-meta { color: var(--text-muted); font-size: 11px; display: flex; gap: 8px; }
        .sidebar-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
        .sidebar-badge.q1 { background: var(--red-dim); color: var(--red-text); }
        .sidebar-badge.q2 { background: var(--blue-dim); color: var(--accent); }
        .sidebar-badge.q3 { background: var(--amber-dim); color: var(--amber-text); }
        .sidebar-badge.q4 { background: rgba(113,113,122,0.15); color: var(--text-muted); }
        .sidebar-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px 2px; }
        .sidebar-tag.person { background: rgba(59,130,246,0.12); color: var(--node-person); }
        .sidebar-tag.topic { background: var(--purple-dim); color: var(--purple-text); }
        .sidebar-tag.page { background: var(--amber-dim); color: var(--amber-text); }
        .sidebar-empty { color: var(--text-muted); font-size: 12px; font-style: italic; padding: 4px 0; }
        .sidebar-page-link { display: flex; align-items: center; gap: 6px; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border-subtle); }
        .sidebar-page-link:last-child { border-bottom: none; }
        .sidebar-page-link a { color: var(--accent); text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-page-link a:hover { text-decoration: underline; }

        /* Node label overlay */
        .node-label { color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,0.6); white-space: nowrap; pointer-events: none; }

        /* Legend */
        .legend { position: absolute; bottom: 16px; left: 16px; display: flex; gap: 14px; z-index: 20; background: rgba(10,10,10,0.7); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-subtle); backdrop-filter: blur(8px); }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

        @media (max-width: 768px) {
            .sidebar.open { width: 280px; }
            .sidebar-inner { width: 280px; }
            .search-box { width: 120px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-row">
            <div class="brand"><h1>TARS</h1><span>Graph</span></div>
            <nav class="nav-links">
                <a href="/">Voice</a>
                <a href="/tasks">Tasks</a>
                <a href="/briefing">Briefing</a>
                <a href="/executive">Executive</a>
                <a href="/graph" class="active">Graph</a>
            </nav>
        </div>
    </header>

    <div class="toolbar" id="toolbar">
        <div class="chip-groups" id="chips"></div>
        <input type="text" class="search-box" id="searchBox" placeholder="Search nodes...">
    </div>

    <div class="graph-wrap">
        <div id="graph3d"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-inner" id="sidebarContent"></div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background: var(--node-person)"></div>People</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--node-topic)"></div>Topics</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--node-page)"></div>Pages</div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // --- State ---
        let graphData = null;
        let graphNodes = [];
        let graphEdges = [];
        let tasks = [];
        let nodeMap = {};       // id -> node object
        let adjacency = {};     // id -> Set of neighbor ids
        let selectedNodeId = null;
        let hoveredNodeId = null;
        let Graph = null;

        const sidebar = document.getElementById('sidebar');
        const sidebarContent = document.getElementById('sidebarContent');
        const searchBox = document.getElementById('searchBox');
        const chipsEl = document.getElementById('chips');
        const graphEl = document.getElementById('graph3d');

        const NODE_COLORS = { person: '#3b82f6', topic: '#a855f7', page: '#f59e0b' };
        const NODE_COLORS_HIGHLIGHT = { person: '#60a5fa', topic: '#c084fc', page: '#fbbf24' };

        // --- Load data ---
        async function loadGraph() {
            try {
                const resp = await fetch('/api/intel/graph');
                if (!resp.ok) return;
                graphData = await resp.json();
                tasks = graphData.tasks || [];
                initGraph(graphData);
            } catch(e) {
                console.error('Failed to load graph', e);
            }
        }

        function initGraph(data) {
            graphNodes = [];
            graphEdges = [];
            nodeMap = {};
            adjacency = {};

            // Compute max weight per type for normalization
            const weightsByType = { person: [], topic: [], page: [] };
            for (const n of data.nodes) {
                if (weightsByType[n.type]) weightsByType[n.type].push(n.weight || 1);
            }
            const maxWeight = {};
            for (const t of ['person', 'topic', 'page']) {
                maxWeight[t] = Math.max(1, ...weightsByType[t]);
            }

            // Node size ranges per type
            const sizeRange = { person: [3, 10], topic: [4, 14], page: [2, 6] };

            for (const n of data.nodes) {
                const weight = n.weight || 1;
                const type = n.type;
                const [sMin, sMax] = sizeRange[type] || [3, 8];
                const norm = Math.log(1 + weight) / Math.log(1 + maxWeight[type]);
                const size = sMin + norm * (sMax - sMin);

                const node = {
                    id: n.id,
                    label: n.label,
                    type: type,
                    weight: weight,
                    url: n.url || '',
                    val: size,
                    color: NODE_COLORS[type] || '#71717a',
                    visible: type !== 'page',
                };
                graphNodes.push(node);
                nodeMap[n.id] = node;
                adjacency[n.id] = new Set();
            }

            // Build edges
            for (const e of data.edges) {
                if (nodeMap[e.source] && nodeMap[e.target]) {
                    graphEdges.push({
                        source: e.source,
                        target: e.target,
                        type: e.type,
                        weight: e.weight || 1,
                    });
                    adjacency[e.source].add(e.target);
                    adjacency[e.target].add(e.source);
                }
            }

            buildChips();
            createGraph();
        }

        function createGraph() {
            const visibleNodes = graphNodes.filter(n => n.visible);
            const visibleIds = new Set(visibleNodes.map(n => n.id));
            const visibleEdges = graphEdges.filter(e => {
                const sid = typeof e.source === 'object' ? e.source.id : e.source;
                const tid = typeof e.target === 'object' ? e.target.id : e.target;
                return visibleIds.has(sid) && visibleIds.has(tid);
            });

            const graphWrap = document.querySelector('.graph-wrap');
            const sidebarW = sidebar.classList.contains('open') ? 340 : 0;
            const width = graphWrap.clientWidth - sidebarW;
            const height = graphWrap.clientHeight;

            if (Graph) {
                // Update existing graph
                Graph.graphData({ nodes: visibleNodes, links: visibleEdges })
                     .width(width)
                     .height(height);
                return;
            }

            Graph = ForceGraph3D()(graphEl)
                .width(width)
                .height(height)
                .backgroundColor('#0a0a0a')
                .graphData({ nodes: visibleNodes, links: visibleEdges })

                // --- Node appearance ---
                .nodeVal(n => n.val)
                .nodeColor(n => {
                    if (selectedNodeId && n.id !== selectedNodeId && !adjacency[selectedNodeId].has(n.id)) {
                        return 'rgba(60,60,70,0.3)';
                    }
                    if (n.id === hoveredNodeId || n.id === selectedNodeId) {
                        return NODE_COLORS_HIGHLIGHT[n.type] || '#aaa';
                    }
                    return n.color;
                })
                .nodeOpacity(0.9)
                .nodeResolution(20)

                // --- Node labels ---
                .nodeLabel(n => '')
                .nodeThreeObject(n => {
                    // Create a sprite label
                    const sprite = new SpriteText(n.label);
                    sprite.color = '#ffffff';
                    sprite.textHeight = 2.5;
                    sprite.fontFace = '-apple-system, BlinkMacSystemFont, sans-serif';
                    sprite.fontWeight = '500';
                    sprite.backgroundColor = false;
                    sprite.padding = 1;
                    // Position above node
                    const nodeRadius = Math.cbrt(n.val) * 2;
                    sprite.position.y = nodeRadius + 3;
                    return sprite;
                })
                .nodeThreeObjectExtend(true)

                // --- Link appearance ---
                .linkWidth(e => Math.min(1.5, 0.2 + e.weight * 0.15))
                .linkOpacity(0.15)
                .linkColor(e => {
                    const sid = typeof e.source === 'object' ? e.source.id : e.source;
                    const tid = typeof e.target === 'object' ? e.target.id : e.target;
                    if (selectedNodeId) {
                        if (sid === selectedNodeId || tid === selectedNodeId) {
                            const sourceNode = nodeMap[sid];
                            return NODE_COLORS[sourceNode ? sourceNode.type : 'person'];
                        }
                        return 'rgba(40,40,50,0.1)';
                    }
                    const sourceNode = nodeMap[sid];
                    return sourceNode ? sourceNode.color : '#555';
                })
                .linkDirectionalParticles(e => {
                    const sid = typeof e.source === 'object' ? e.source.id : e.source;
                    const tid = typeof e.target === 'object' ? e.target.id : e.target;
                    if (selectedNodeId && (sid === selectedNodeId || tid === selectedNodeId)) {
                        return 2;
                    }
                    return 0;
                })
                .linkDirectionalParticleWidth(1.2)
                .linkDirectionalParticleSpeed(0.006)
                .linkDirectionalParticleColor(e => {
                    const sid = typeof e.source === 'object' ? e.source.id : e.source;
                    const sourceNode = nodeMap[sid];
                    return sourceNode ? NODE_COLORS_HIGHLIGHT[sourceNode.type] : '#fff';
                })
                .linkCurvature(0.15)
                .linkCurveRotation(0.5)

                // --- Force config ---
                .d3Force('charge').strength(n => {
                    return -80 * (n.val || 4);
                });

            // Additional force tuning
            Graph.d3Force('link').distance(e => 60 + (e.weight || 1) * 5);
            Graph.d3Force('center').strength(0.05);

            // Warm up
            Graph.d3AlphaDecay(0.02);
            Graph.d3VelocityDecay(0.3);

            // --- Interactions ---
            Graph.onNodeClick(n => selectNode(n.id));
            Graph.onNodeHover(n => {
                hoveredNodeId = n ? n.id : null;
                graphEl.style.cursor = n ? 'pointer' : 'default';
                Graph.nodeColor(Graph.nodeColor()); // refresh
            });
            Graph.onBackgroundClick(() => {
                selectedNodeId = null;
                closeSidebar();
                resetPageVisibility();
                updateChipState();
                refreshGraph();
            });

            // Add bloom post-processing
            addBloomEffect();
        }

        function addBloomEffect() {
            if (!Graph) return;
            const renderer = Graph.renderer();
            const scene = Graph.scene();
            const camera = Graph.camera();

            // Import three.js addons for bloom
            import('https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js').then(({ EffectComposer }) => {
                return Promise.all([
                    Promise.resolve(EffectComposer),
                    import('https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js'),
                    import('https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js'),
                ]);
            }).then(([EffectComposer, { RenderPass }, { UnrealBloomPass }]) => {
                const composer = new EffectComposer(renderer);
                composer.addPass(new RenderPass(scene, camera));

                const bloomPass = new UnrealBloomPass(
                    { x: window.innerWidth, y: window.innerHeight },
                    1.2,   // strength
                    0.4,   // radius
                    0.85   // threshold
                );
                composer.addPass(bloomPass);

                // Override the render loop
                Graph.postProcessingComposer(composer);
            }).catch(e => {
                console.log('Bloom not available, continuing without it:', e.message);
            });
        }

        function refreshGraph() {
            if (!Graph) return;
            // Force color refresh
            Graph.nodeColor(Graph.nodeColor());
            Graph.linkColor(Graph.linkColor());
            Graph.linkDirectionalParticles(Graph.linkDirectionalParticles());
            Graph.linkOpacity(e => {
                const sid = typeof e.source === 'object' ? e.source.id : e.source;
                const tid = typeof e.target === 'object' ? e.target.id : e.target;
                if (selectedNodeId) {
                    return (sid === selectedNodeId || tid === selectedNodeId) ? 0.6 : 0.04;
                }
                return 0.15;
            });
        }

        // --- Filter chips ---
        const CHIP_LIMIT = 10;
        let peopleExpanded = false;
        let topicsExpanded = false;

        function buildChips() {
            const people = graphNodes.filter(n => n.type === 'person').sort((a, b) => b.weight - a.weight);
            const topics = graphNodes.filter(n => n.type === 'topic').sort((a, b) => b.weight - a.weight);

            let html = '';

            // People group
            html += '<div class="chip-group" id="peopleGroup">';
            const showPeople = peopleExpanded ? people : people.slice(0, CHIP_LIMIT);
            for (const n of showPeople) {
                html += '<button class="chip person" data-id="' + esc(n.id) + '"><span class="chip-dot person"></span>' + esc(n.label) + '</button>';
            }
            if (people.length > CHIP_LIMIT) {
                if (peopleExpanded) {
                    html += '<button class="chip expand-toggle" data-toggle="people">Show less</button>';
                } else {
                    html += '<button class="chip expand-toggle" data-toggle="people">+' + (people.length - CHIP_LIMIT) + ' more</button>';
                }
            }
            html += '</div>';

            // Topics group
            html += '<div class="chip-group" id="topicsGroup">';
            const showTopics = topicsExpanded ? topics : topics.slice(0, CHIP_LIMIT);
            for (const n of showTopics) {
                html += '<button class="chip topic" data-id="' + esc(n.id) + '"><span class="chip-dot topic"></span>' + esc(n.label) + '</button>';
            }
            if (topics.length > CHIP_LIMIT) {
                if (topicsExpanded) {
                    html += '<button class="chip expand-toggle" data-toggle="topics">Show less</button>';
                } else {
                    html += '<button class="chip expand-toggle" data-toggle="topics">+' + (topics.length - CHIP_LIMIT) + ' more</button>';
                }
            }
            html += '</div>';

            chipsEl.innerHTML = html;

            chipsEl.querySelectorAll('.chip[data-id]').forEach(btn => {
                btn.addEventListener('click', () => selectNode(btn.dataset.id));
            });

            chipsEl.querySelectorAll('.chip[data-toggle]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.toggle === 'people') peopleExpanded = !peopleExpanded;
                    if (btn.dataset.toggle === 'topics') topicsExpanded = !topicsExpanded;
                    buildChips();
                    updateChipState();
                });
            });
        }

        // --- Selection ---
        function selectNode(nodeId) {
            if (selectedNodeId === nodeId) {
                selectedNodeId = null;
                closeSidebar();
                resetPageVisibility();
            } else {
                selectedNodeId = nodeId;
                showConnectedPages(nodeId);
                openSidebar(nodeId);

                // Focus camera on node
                const node = nodeMap[nodeId];
                if (node && Graph) {
                    const distance = 200;
                    const distRatio = 1 + distance / Math.hypot(node.x || 0, node.y || 0, node.z || 0);
                    Graph.cameraPosition(
                        { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
                        node,
                        1500
                    );
                }
            }
            updateChipState();
            refreshGraph();
        }

        function showConnectedPages(nodeId) {
            // Reset all page visibility
            for (const n of graphNodes) {
                if (n.type === 'page') n.visible = false;
            }
            // Show pages connected to selected node
            for (const neighborId of adjacency[nodeId] || []) {
                const neighbor = nodeMap[neighborId];
                if (neighbor && neighbor.type === 'page') {
                    neighbor.visible = true;
                }
            }
            // Rebuild graph data
            createGraph();
        }

        function resetPageVisibility() {
            for (const n of graphNodes) {
                if (n.type === 'page') n.visible = false;
            }
            createGraph();
        }

        function updateChipState() {
            chipsEl.querySelectorAll('.chip[data-id]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === selectedNodeId);
            });
        }

        // --- Sidebar ---
        function openSidebar(nodeId) {
            const node = nodeMap[nodeId];
            if (!node) return;
            sidebar.classList.add('open');
            resizeGraph();

            let html = '<div class="sidebar-head">';
            html += '<div><div class="sidebar-title">' + esc(node.label) + '</div>';
            html += '<span class="sidebar-type ' + node.type + '">' + node.type + '</span></div>';
            html += '<button class="sidebar-close" onclick="closeSidebarGlobal()">&times;</button></div>';

            if (node.type === 'person') {
                html += renderPersonSidebar(nodeId, node);
            } else if (node.type === 'topic') {
                html += renderTopicSidebar(nodeId, node);
            } else if (node.type === 'page') {
                html += renderPageSidebar(nodeId, node);
            }

            sidebarContent.innerHTML = html;
        }

        function renderPersonSidebar(nodeId, node) {
            let html = '';
            const neighbors = Array.from(adjacency[nodeId] || []);
            const connTopics = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'topic').map(id => nodeMap[id]);
            const connPages = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'page').map(id => nodeMap[id]);
            const personTasks = tasks.filter(t => t.owner && t.owner.toLowerCase() === node.label.toLowerCase());

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Topics (' + connTopics.length + ')</div>';
            if (connTopics.length) {
                for (const t of connTopics.sort((a, b) => b.weight - a.weight)) {
                    html += '<span class="sidebar-tag topic">' + esc(t.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No connected topics</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Open Tasks (' + personTasks.length + ')</div>';
            if (personTasks.length) {
                for (const t of personTasks.sort((a, b) => (a.quadrant || 4) - (b.quadrant || 4))) {
                    html += renderTaskCard(t);
                }
            } else {
                html += '<div class="sidebar-empty">No open tasks</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Source Pages (' + connPages.length + ')</div>';
            if (connPages.length) {
                for (const p of connPages) {
                    html += renderPageLink(p);
                }
            } else {
                html += '<div class="sidebar-empty">No connected pages</div>';
            }
            html += '</div>';

            return html;
        }

        function renderTopicSidebar(nodeId, node) {
            let html = '';
            const neighbors = Array.from(adjacency[nodeId] || []);
            const connPeople = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'person').map(id => nodeMap[id]);
            const connPages = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'page').map(id => nodeMap[id]);
            const topicTasks = tasks.filter(t => t.topics && t.topics.includes(node.label));

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">People (' + connPeople.length + ')</div>';
            if (connPeople.length) {
                for (const p of connPeople.sort((a, b) => b.weight - a.weight)) {
                    html += '<span class="sidebar-tag person">' + esc(p.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No connected people</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Open Tasks (' + topicTasks.length + ')</div>';
            if (topicTasks.length) {
                for (const t of topicTasks.sort((a, b) => (a.quadrant || 4) - (b.quadrant || 4))) {
                    html += renderTaskCard(t);
                }
            } else {
                html += '<div class="sidebar-empty">No open tasks for this topic</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Source Pages (' + connPages.length + ')</div>';
            if (connPages.length) {
                for (const p of connPages) {
                    html += renderPageLink(p);
                }
            } else {
                html += '<div class="sidebar-empty">No connected pages</div>';
            }
            html += '</div>';

            return html;
        }

        function renderPageSidebar(nodeId, node) {
            let html = '';
            const neighbors = Array.from(adjacency[nodeId] || []);
            const connPeople = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'person').map(id => nodeMap[id]);
            const connTopics = neighbors.filter(id => nodeMap[id] && nodeMap[id].type === 'topic').map(id => nodeMap[id]);

            if (node.url) {
                html += '<div class="sidebar-section">';
                html += '<a href="' + esc(node.url) + '" target="_blank" style="color:var(--accent);font-size:13px;">Open in Notion &rarr;</a>';
                html += '</div>';
            }

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">People (' + connPeople.length + ')</div>';
            if (connPeople.length) {
                for (const p of connPeople) {
                    html += '<span class="sidebar-tag person">' + esc(p.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No people mentioned</div>';
            }
            html += '</div>';

            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Topics (' + connTopics.length + ')</div>';
            if (connTopics.length) {
                for (const t of connTopics) {
                    html += '<span class="sidebar-tag topic">' + esc(t.label) + '</span>';
                }
            } else {
                html += '<div class="sidebar-empty">No topics detected</div>';
            }
            html += '</div>';

            const pageId = node.id.replace('page:', '');
            const pageTasks = tasks.filter(t => t.source_page_id === pageId);
            html += '<div class="sidebar-section">';
            html += '<div class="sidebar-label">Tasks from this page (' + pageTasks.length + ')</div>';
            if (pageTasks.length) {
                for (const t of pageTasks) {
                    html += renderTaskCard(t);
                }
            } else {
                html += '<div class="sidebar-empty">No tasks extracted</div>';
            }
            html += '</div>';

            return html;
        }

        function renderTaskCard(t) {
            const qClass = 'q' + (t.quadrant || 4);
            let html = '<div class="sidebar-task">';
            html += '<div class="sidebar-task-desc">' + esc(t.description) + '</div>';
            html += '<div class="sidebar-task-meta">';
            html += '<span class="sidebar-badge ' + qClass + '">' + esc(t.quadrant_label || 'Defer') + '</span>';
            if (t.follow_up_date) html += '<span>' + t.follow_up_date + '</span>';
            if (t.owner) html += '<span>' + esc(t.owner) + '</span>';
            html += '</div></div>';
            return html;
        }

        function renderPageLink(p) {
            let html = '<div class="sidebar-page-link">';
            if (p.url) {
                html += '<a href="' + esc(p.url) + '" target="_blank">' + esc(p.label) + '</a>';
            } else {
                html += '<span style="color:var(--text-secondary)">' + esc(p.label) + '</span>';
            }
            html += '</div>';
            return html;
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            resizeGraph();
        }
        window.closeSidebarGlobal = closeSidebar;

        function resizeGraph() {
            if (!Graph) return;
            const graphWrap = document.querySelector('.graph-wrap');
            const sidebarW = sidebar.classList.contains('open') ? 340 : 0;
            Graph.width(graphWrap.clientWidth - sidebarW);
            Graph.height(graphWrap.clientHeight);
        }

        // --- Search ---
        searchBox.addEventListener('input', () => {
            const query = searchBox.value.trim().toLowerCase();
            if (!Graph) return;
            if (query) {
                Graph.nodeColor(n => {
                    if (n.label.toLowerCase().includes(query)) {
                        return NODE_COLORS_HIGHLIGHT[n.type] || '#fff';
                    }
                    return 'rgba(60,60,70,0.2)';
                });
                Graph.linkOpacity(() => 0.03);
            } else {
                selectedNodeId = null;
                Graph.nodeColor(n => n.color);
                Graph.linkOpacity(() => 0.15);
            }
        });

        // --- Escape to deselect ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                selectedNodeId = null;
                closeSidebar();
                resetPageVisibility();
                updateChipState();
                searchBox.value = '';
                refreshGraph();
            }
        });

        // --- Resize ---
        const resizeObs = new ResizeObserver(() => resizeGraph());
        resizeObs.observe(document.querySelector('.graph-wrap'));
        window.addEventListener('resize', resizeGraph);

        // --- Utilities ---
        function esc(s) {
            if (!s) return '';
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }

        // --- Init ---
        loadGraph();
    })();
    </script>

</body>
</html>
