<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS Executive Summary</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #111113; --surface-raised: #18181b;
            --border: #27272a; --border-subtle: #1e1e21;
            --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
            --accent: #3b82f6; --green: #22c55e; --green-dim: rgba(34,197,94,0.12); --green-text: #4ade80;
            --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.10); --amber-text: #fbbf24;
            --red: #ef4444; --red-dim: rgba(239,68,68,0.10); --red-text: #f87171;
            --blue-dim: rgba(59,130,246,0.10); --purple: #a855f7; --purple-dim: rgba(168,85,247,0.10); --purple-text: #c084fc;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
        .shell { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
        header { border-bottom: 1px solid var(--border-subtle); padding: 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 50; }
        .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
        .brand span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
        .nav-links a:hover { color: var(--text-secondary); background: var(--surface); }
        .nav-links a.active { color: var(--text); background: var(--surface-raised); }

        .page-header { padding: 24px 0 16px; display: flex; align-items: center; justify-content: space-between; }
        .page-title { font-size: 20px; font-weight: 600; }
        .scan-info { font-size: 12px; color: var(--text-muted); }
        .scan-btn { background: var(--surface-raised); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 7px 18px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .scan-btn:hover { background: var(--border); border-color: var(--text-muted); }
        .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .scan-toast { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; font-size: 12px; color: var(--text-secondary); display: none; align-items: center; gap: 8px; margin-bottom: 12px; }
        .scan-toast.visible { display: flex; }
        .scan-toast.scan-success { border-color: var(--green); color: var(--green-text); }
        .scan-toast.scan-error { border-color: var(--red); color: var(--red-text); }
        .scan-spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .scan-progress { display: none; margin-bottom: 16px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
        .scan-progress.visible { display: block; }
        .scan-progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .scan-progress-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
        .scan-progress-spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
        .scan-progress-bar-track { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
        .scan-progress-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; width: 0%; }
        .scan-progress-bar-fill.cancelled { background: var(--yellow, #e6a817); }
        .scan-progress-bar-fill.error { background: var(--red); }
        .scan-progress-bar-fill.success { background: var(--green); }
        .scan-progress-detail { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-muted); }
        .scan-stop-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .scan-stop-btn:hover { border-color: var(--red); color: var(--red-text, #ef4444); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Stats */
        .stats { display: flex; gap: 1px; background: var(--border-subtle); border-radius: 8px; overflow: hidden; margin: 16px 0 24px; }
        .stat { flex: 1; background: var(--surface); padding: 12px 16px; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.2; }
        .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-top: 2px; }

        /* Matrix */
        .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .matrix-cell { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 14px 16px; min-height: 120px; transition: background 0.15s; }
        .matrix-cell.drag-over { background: var(--surface-raised); border-color: var(--accent); }
        .matrix-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; user-select: none; }
        .matrix-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
        .matrix-count { font-size: 11px; color: var(--text-muted); }
        .matrix-toggle { font-size: 10px; color: var(--text-muted); margin-left: 6px; transition: transform 0.2s; display: inline-block; }
        .matrix-toggle.collapsed { transform: rotate(-90deg); }
        .matrix-items { overflow: hidden; transition: max-height 0.25s ease; }
        .matrix-items.collapsed { max-height: 0 !important; }

        .q1 .matrix-label { color: var(--red-text); }
        .q1 { border-left: 3px solid var(--red); }
        .q2 .matrix-label { color: var(--accent); }
        .q2 { border-left: 3px solid var(--accent); }
        .q3 .matrix-label { color: var(--amber-text); }
        .q3 { border-left: 3px solid var(--amber); }
        .q4 .matrix-label { color: var(--text-muted); }
        .q4 { border-left: 3px solid var(--border); }

        .matrix-item { padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 6px; cursor: grab; }
        .matrix-item:active { cursor: grabbing; }
        .matrix-item.dragging { opacity: 0.4; }
        .matrix-item:last-child { border-bottom: none; }
        .matrix-desc { flex: 1; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .matrix-desc:hover { color: var(--accent); }
        .matrix-owner { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
        .matrix-date { font-size: 11px; font-variant-numeric: tabular-nums; white-space: nowrap; }
        .date-overdue { color: var(--red-text); }
        .date-soon { color: var(--amber-text); }
        .date-ok { color: var(--text-muted); }
        .matrix-empty { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 8px 0; }

        .matrix-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .act-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; font-size: 14px; line-height: 1; border-radius: 3px; transition: background 0.15s; color: var(--text-muted); }
        .act-btn:hover { background: var(--surface-raised); }
        .act-done:hover { color: var(--green-text); }
        .act-del:hover { color: var(--red-text); }
        .show-more { font-size: 12px; color: var(--text-muted); cursor: pointer; padding: 6px 0; }
        .show-more:hover { color: var(--text-secondary); }

        /* Sections */
        .section { margin-bottom: 28px; }
        .section-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle); }
        .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }
        .section-count { font-size: 11px; color: var(--text-muted); }

        /* Follow-up list */
        .fu-row { display: flex; align-items: baseline; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
        .fu-row:last-child { border-bottom: none; }
        .fu-date { min-width: 80px; font-size: 12px; font-variant-numeric: tabular-nums; }
        .fu-desc { flex: 1; color: var(--text); }
        .fu-owner { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
        .fu-action { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .fu-action:hover { color: var(--text); border-color: var(--text-muted); }

        /* Topics & People */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: baseline; gap: 6px; }
        .tag-count { color: var(--text-muted); font-size: 11px; }

        .empty { text-align: center; padding: 48px; color: var(--text-muted); font-size: 13px; }

        /* Modal overlay */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-overlay.visible { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 24px; }
        .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .modal-field { margin-bottom: 14px; }
        .modal-field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
        .modal-field input, .modal-field textarea, .modal-field select {
            width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
            font-family: inherit; font-size: 13px; padding: 8px 10px; border-radius: 6px; outline: none;
        }
        .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: var(--accent); }
        .modal-field textarea { resize: vertical; min-height: 80px; }
        .modal-field .hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
        .modal-row { display: flex; gap: 12px; }
        .modal-row .modal-field { flex: 1; }
        .modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border-subtle); }
        .modal-foot button { font-family: inherit; font-size: 13px; padding: 7px 18px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
        .btn-cancel { background: var(--surface-raised); color: var(--text-secondary); }
        .btn-cancel:hover { background: var(--border); }
        .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-save:hover { opacity: 0.9; }
        .modal-context { margin-top: 14px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border-subtle); border-radius: 6px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; display: none; }
        .modal-context.visible { display: block; }
        .modal-context-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
        .modal-topics { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .modal-topic-tag { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .modal-source { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
        .modal-source a { color: var(--accent); text-decoration: none; }
        .modal-source a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            .matrix { grid-template-columns: 1fr; }
            .two-col { grid-template-columns: 1fr; }
            .stats .stat { padding: 10px 6px; }
            .stat-val { font-size: 18px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="shell">
            <div class="header-row">
                <div class="brand"><h1>TARS</h1><span>Executive Summary</span></div>
                <nav class="nav-links">
                    <a href="/">Voice</a>
                    <a href="/tasks">Tasks</a>
                    <a href="/briefing">Briefing</a>
                    <a href="/executive" class="active">Executive</a>
                    <a href="/graph">Graph</a>
                </nav>
            </div>
        </div>
    </header>
    <main class="shell">
        <div class="page-header">
            <div>
                <div class="page-title">Executive Summary</div>
                <div class="scan-info" id="scanInfo">Not yet scanned.</div>
            </div>
            <div style="display:flex;gap:6px;">
                <button class="scan-btn" id="scanBtn" onclick="runScan()">Scan New</button>
                <button class="scan-btn" id="fullScanBtn" onclick="runScan(true)" style="color:var(--text-muted);font-size:12px;padding:7px 12px;">Full Scan</button>
            </div>
        </div>
        <div class="scan-toast" id="scanToast"><div class="scan-spinner" id="scanSpinner"></div><span id="scanToastMsg">Scanning...</span></div>
        <div class="scan-progress" id="scanProgress">
            <div class="scan-progress-header">
                <div class="scan-progress-info">
                    <div class="scan-progress-spinner" id="scanProgressSpinner"></div>
                    <span id="scanProgressMsg">Preparing scan...</span>
                </div>
                <button class="scan-stop-btn" id="scanStopBtn" onclick="cancelScan()">Stop</button>
            </div>
            <div class="scan-progress-bar-track">
                <div class="scan-progress-bar-fill" id="scanProgressFill"></div>
            </div>
            <div class="scan-progress-detail">
                <span id="scanProgressPage">0 / 0 pages</span>
                <span id="scanProgressTasks">0 new tasks</span>
            </div>
        </div>
        <div id="content"><div class="empty">Click "Scan New" to analyze your pages and build your intelligence profile.</div></div>
    </main>

    <!-- Task detail modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <h2 id="modalTitle">Edit Task</h2>
            <input type="hidden" id="modalTaskId">
            <div class="modal-field">
                <label>Title / Description</label>
                <input type="text" id="modalDesc">
            </div>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Owner</label>
                    <input type="text" id="modalOwner">
                </div>
                <div class="modal-field">
                    <label>Quadrant</label>
                    <select id="modalQuadrant">
                        <option value="1">Do First</option>
                        <option value="2">Schedule</option>
                        <option value="3">Delegate</option>
                        <option value="4">Defer</option>
                    </select>
                </div>
            </div>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Follow-up Date</label>
                    <input type="date" id="modalDate">
                </div>
                <div class="modal-field">
                    <label>Status</label>
                    <select id="modalStatus">
                        <option value="open">Open</option>
                        <option value="done">Done</option>
                    </select>
                </div>
            </div>
            <div class="modal-field">
                <label>Steps / Action Items</label>
                <textarea id="modalSteps" placeholder="1. First step&#10;2. Second step&#10;3. ..."></textarea>
                <div class="hint">Break down the task into clear, delegatable steps.</div>
            </div>
            <div id="modalContext"></div>
            <div class="modal-source" id="modalSource"></div>
            <div class="modal-foot">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveModal()">Save</button>
            </div>
        </div>
    </div>

    <script>
    (function(){
        'use strict';
        const content = document.getElementById('content');
        const scanInfo = document.getElementById('scanInfo');
        const scanBtn = document.getElementById('scanBtn');
        const fullScanBtn = document.getElementById('fullScanBtn');
        const scanToast = document.getElementById('scanToast');
        const scanSpinner = document.getElementById('scanSpinner');
        const scanToastMsg = document.getElementById('scanToastMsg');
        const modalOverlay = document.getElementById('modalOverlay');

        // Collapse state per quadrant (persisted in sessionStorage)
        const collapseState = JSON.parse(sessionStorage.getItem('execCollapse') || '{}');
        // Expand state per quadrant (show all vs first 6)
        const expandState = {};

        function showToast(msg, type) {
            scanToast.className = 'scan-toast visible' + (type ? ' scan-' + type : '');
            scanSpinner.style.display = type ? 'none' : 'block';
            scanToastMsg.textContent = msg;
            if (type) setTimeout(() => { scanToast.className = 'scan-toast'; }, 5000);
        }

        async function loadIntel() {
            try {
                const resp = await fetch('/api/intel');
                if (!resp.ok) return;
                const data = await resp.json();
                if (data.last_scan_at) {
                    renderIntel(data);
                    scanInfo.textContent = 'Last scan: ' + new Date(data.last_scan_at).toLocaleString(undefined, {hour12:false}) + ' \u2014 ' + data.pages_scanned + ' pages';
                }
            } catch(e) {}
        }

        // Progress bar elements
        const scanProgress = document.getElementById('scanProgress');
        const scanProgressFill = document.getElementById('scanProgressFill');
        const scanProgressMsg = document.getElementById('scanProgressMsg');
        const scanProgressPage = document.getElementById('scanProgressPage');
        const scanProgressTasks = document.getElementById('scanProgressTasks');
        const scanProgressSpinner = document.getElementById('scanProgressSpinner');
        const scanStopBtn = document.getElementById('scanStopBtn');
        let activeScanId = null;
        let activeScanReader = null;

        function showProgress() {
            scanProgress.classList.add('visible');
            scanToast.className = 'scan-toast';
            scanProgressFill.className = 'scan-progress-bar-fill';
            scanProgressFill.style.width = '0%';
            scanProgressMsg.textContent = 'Preparing scan...';
            scanProgressPage.textContent = '0 / 0 pages';
            scanProgressTasks.textContent = '0 new tasks';
            scanProgressSpinner.style.display = 'block';
            scanStopBtn.style.display = 'inline-block';
        }

        function updateProgress(data) {
            if (data.total > 0) {
                const pct = Math.round((data.current / data.total) * 100);
                scanProgressFill.style.width = pct + '%';
                scanProgressPage.textContent = data.current + ' / ' + data.total + ' pages';
            }
            if (data.page_title) {
                scanProgressMsg.textContent = 'Processing: ' + data.page_title;
            }
            if (data.status === 'started') {
                scanProgressMsg.textContent = 'Fetched ' + data.total + ' pages, starting scan...';
            }
            if (data.status === 'finalizing') {
                scanProgressMsg.textContent = 'Finalizing — building executive summary...';
                scanProgressFill.style.width = '100%';
            }
            scanProgressTasks.textContent = (data.new_tasks || 0) + ' new tasks';
        }

        function finishProgress(type, msg) {
            scanProgressSpinner.style.display = 'none';
            scanStopBtn.style.display = 'none';
            scanProgressMsg.textContent = msg;
            scanProgressFill.className = 'scan-progress-bar-fill ' + type;
            if (type === 'success') scanProgressFill.style.width = '100%';
            setTimeout(() => { scanProgress.classList.remove('visible'); }, 5000);
        }

        window.cancelScan = async function() {
            if (!activeScanId) return;
            scanStopBtn.disabled = true;
            scanStopBtn.textContent = 'Stopping...';
            try {
                await fetch('/api/intel/scan/cancel?scan_id=' + activeScanId, { method: 'POST' });
            } catch(e) {}
        };

        window.runScan = async function(full) {
            scanBtn.disabled = true;
            fullScanBtn.disabled = true;
            scanBtn.textContent = 'Scanning...';
            const label = full ? 'Full scan' : 'Incremental scan';
            showProgress();
            scanProgressMsg.textContent = label + ': fetching pages from Notion...';

            try {
                const url = '/api/intel/scan/stream' + (full ? '?full_scan=true' : '');
                const resp = await fetch(url, { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.text();
                    throw new Error(err || 'Scan failed: ' + resp.status);
                }

                const reader = resp.body.getReader();
                activeScanReader = reader;
                const decoder = new TextDecoder();
                let buffer = '';
                let lastData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.scan_id) activeScanId = data.scan_id;

                            if (data.status === 'complete') {
                                lastData = data;
                                scanInfo.textContent = 'Last scan: ' + new Date().toLocaleString(undefined, {hour12:false}) + ' \u2014 ' + data.pages_scanned + ' pages';
                                finishProgress('success', label + ' complete \u2014 ' + data.pages_scanned + ' pages, ' + data.new_tasks_added + ' new tasks');
                                await loadIntel();
                            } else if (data.status === 'cancelled') {
                                lastData = data;
                                finishProgress('cancelled', label + ' stopped at ' + data.current + '/' + data.total + ' pages');
                                await loadIntel();
                            } else if (data.status === 'error') {
                                lastData = data;
                                finishProgress('error', 'Scan failed: ' + data.message);
                            } else {
                                updateProgress(data);
                            }
                        } catch(e) {}
                    }
                }

                // If we never got a final status, show generic success
                if (!lastData || !['complete','cancelled','error'].includes(lastData.status)) {
                    finishProgress('success', label + ' complete');
                    await loadIntel();
                }
            } catch(err) {
                finishProgress('error', 'Scan failed: ' + err.message);
            }

            activeScanId = null;
            activeScanReader = null;
            scanBtn.disabled = false;
            fullScanBtn.disabled = false;
            scanBtn.textContent = 'Scan New';
            scanStopBtn.disabled = false;
            scanStopBtn.textContent = 'Stop';
        };

        // Keep a reference to the full data for the modal
        let currentIntel = null;

        function renderIntel(data) {
            currentIntel = data;
            const es = data.executive_summary || {};
            const mx = es.matrix || {};
            let html = '';

            // Stats
            html += '<div class="stats">';
            html += stat(es.total_open || 0, 'Open tasks', '--text');
            html += stat(mx.q1_count || 0, 'Do first', '--red-text');
            html += stat(mx.q2_count || 0, 'Schedule', '--accent');
            html += stat(es.total_delegated || 0, 'Delegated', '--amber-text');
            html += stat(es.total_overdue || 0, 'Overdue', '--red-text');
            html += stat(Object.keys(data.people || {}).length, 'People', '--text-secondary');
            html += '</div>';

            // Eisenhower Matrix
            html += '<div class="matrix">';
            html += matrixCell('q1', 'Do First', mx.q1_do_first || [], 1);
            html += matrixCell('q2', 'Schedule', mx.q2_schedule || [], 2);
            html += matrixCell('q3', 'Delegate', mx.q3_delegate || [], 3);
            html += matrixCell('q4', 'Defer', mx.q4_defer || [], 4);
            html += '</div>';

            // Overdue follow-ups
            const overdue = es.overdue_follow_ups || [];
            if (overdue.length > 0) {
                html += '<div class="section">';
                html += secHead('Overdue Follow-ups', overdue.length);
                html += fuList(overdue, 'date-overdue');
                html += '</div>';
            }

            // Upcoming follow-ups
            const upcoming = es.upcoming_follow_ups || [];
            if (upcoming.length > 0) {
                html += '<div class="section">';
                html += secHead('Upcoming Follow-ups (7 days)', upcoming.length);
                html += fuList(upcoming, 'date-soon');
                html += '</div>';
            }

            // Topics & People
            const topics = es.top_topics || data.topics || {};
            const people = data.people || {};
            if (Object.keys(topics).length > 0 || Object.keys(people).length > 0) {
                html += '<div class="two-col">';
                html += '<div class="section">';
                html += secHead('Your Topics', Object.keys(topics).length);
                html += '<div class="tag-list">';
                for (const [t, c] of Object.entries(topics)) {
                    html += '<span class="tag">' + esc(t) + '<span class="tag-count">' + c + '</span></span>';
                }
                html += '</div></div>';
                html += '<div class="section">';
                html += secHead('People You Work With', Object.keys(people).length);
                html += '<div class="tag-list">';
                for (const [p, c] of Object.entries(people)) {
                    html += '<span class="tag">' + esc(p) + '<span class="tag-count">' + c + '</span></span>';
                }
                html += '</div></div>';
                html += '</div>';
            }

            // Delegation summary
            const deleg = es.delegation_summary || {};
            if (Object.keys(deleg).length > 0) {
                html += '<div class="section">';
                html += secHead('Delegation Load', Object.keys(deleg).length + ' people');
                html += '<div class="tag-list">';
                for (const [p, c] of Object.entries(deleg).sort((a,b) => b[1] - a[1])) {
                    html += '<span class="tag">' + esc(p) + '<span class="tag-count">' + c + ' tasks</span></span>';
                }
                html += '</div></div>';
            }

            content.innerHTML = html || '<div class="empty">No intelligence data yet.</div>';

            // Bind done buttons in follow-up sections
            content.querySelectorAll('.fu-action').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await fetch('/api/intel/tasks/' + btn.dataset.id, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({status: 'done'}),
                    });
                    await loadIntel();
                });
            });

            // Bind drag-and-drop
            initDragAndDrop();

            // Bind collapse toggles
            content.querySelectorAll('.matrix-head').forEach(head => {
                head.addEventListener('click', () => {
                    const qid = head.dataset.qid;
                    const items = head.nextElementSibling;
                    const toggle = head.querySelector('.matrix-toggle');
                    const isCollapsed = !items.classList.contains('collapsed');
                    if (isCollapsed) {
                        items.classList.add('collapsed');
                        toggle.classList.add('collapsed');
                        collapseState[qid] = true;
                    } else {
                        items.classList.remove('collapsed');
                        toggle.classList.remove('collapsed');
                        delete collapseState[qid];
                    }
                    sessionStorage.setItem('execCollapse', JSON.stringify(collapseState));
                });
            });

            // Bind show-more
            content.querySelectorAll('.show-more').forEach(el => {
                el.addEventListener('click', () => {
                    expandState[el.dataset.qid] = true;
                    renderIntel(currentIntel);
                });
            });

            // Bind task actions (done / delete)
            content.querySelectorAll('.act-done').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    await fetch('/api/intel/tasks/' + btn.dataset.id, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({status: 'done'}),
                    });
                    await loadIntel();
                });
            });
            content.querySelectorAll('.act-del').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    await fetch('/api/intel/tasks/' + btn.dataset.id, { method: 'DELETE' });
                    await loadIntel();
                });
            });

            // Bind click-to-edit on description
            content.querySelectorAll('.matrix-desc').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(el.dataset.id);
                });
            });
        }

        // ---- Drag & Drop ----
        function initDragAndDrop() {
            const items = content.querySelectorAll('.matrix-item');
            const cells = content.querySelectorAll('.matrix-cell');

            items.forEach(item => {
                item.setAttribute('draggable', 'true');
                item.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', item.dataset.id);
                    e.dataTransfer.effectAllowed = 'move';
                    requestAnimationFrame(() => item.classList.add('dragging'));
                });
                item.addEventListener('dragend', () => item.classList.remove('dragging'));
            });

            cells.forEach(cell => {
                cell.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; cell.classList.add('drag-over'); });
                cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
                cell.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    cell.classList.remove('drag-over');
                    const taskId = e.dataTransfer.getData('text/plain');
                    const newQ = parseInt(cell.dataset.quadrant);
                    if (!taskId || !newQ) return;
                    await fetch('/api/intel/tasks/' + taskId, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({quadrant: newQ}),
                    });
                    await loadIntel();
                });
            });
        }

        // ---- Modal ----
        function findTask(id) {
            if (!currentIntel) return null;
            const mx = currentIntel.executive_summary?.matrix || {};
            for (const list of [mx.q1_do_first, mx.q2_schedule, mx.q3_delegate, mx.q4_defer]) {
                if (!list) continue;
                const t = list.find(x => x.id === id);
                if (t) return t;
            }
            return null;
        }

        function openModal(taskId) {
            const t = findTask(taskId);
            if (!t) return;
            document.getElementById('modalTaskId').value = taskId;
            document.getElementById('modalDesc').value = t.description || '';
            document.getElementById('modalOwner').value = t.owner || '';
            document.getElementById('modalQuadrant').value = t.quadrant || 4;
            document.getElementById('modalDate').value = t.follow_up_date || '';
            document.getElementById('modalStatus').value = t.status || 'open';
            document.getElementById('modalSteps').value = t.steps || '';

            // Source context
            const ctx = document.getElementById('modalContext');
            if (t.source_context || (t.topics && t.topics.length)) {
                let ch = '';
                if (t.source_context) {
                    ch += '<div class="modal-context-label">Source Context</div>';
                    ch += '<div class="modal-context visible">' + esc(t.source_context) + '</div>';
                }
                if (t.topics && t.topics.length && !(t.topics.length === 1 && t.topics[0] === 'general')) {
                    ch += '<div class="modal-topics">';
                    for (const topic of t.topics) {
                        ch += '<span class="modal-topic-tag">' + esc(topic) + '</span>';
                    }
                    ch += '</div>';
                }
                ctx.innerHTML = ch;
                ctx.style.display = 'block';
            } else {
                ctx.innerHTML = '';
                ctx.style.display = 'none';
            }

            // Source link
            const src = document.getElementById('modalSource');
            if (t.source_title) {
                src.innerHTML = 'Source: ' + (t.source_url ? '<a href="' + esc(t.source_url) + '" target="_blank">' + esc(t.source_title) + '</a>' : esc(t.source_title));
            } else {
                src.innerHTML = '';
            }
            modalOverlay.classList.add('visible');
        }

        window.closeModal = function() {
            modalOverlay.classList.remove('visible');
        };

        window.saveModal = async function() {
            const taskId = document.getElementById('modalTaskId').value;
            const payload = {
                description: document.getElementById('modalDesc').value,
                owner: document.getElementById('modalOwner').value,
                quadrant: parseInt(document.getElementById('modalQuadrant').value),
                follow_up_date: document.getElementById('modalDate').value,
                status: document.getElementById('modalStatus').value,
                steps: document.getElementById('modalSteps').value,
            };
            await fetch('/api/intel/tasks/' + taskId, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            closeModal();
            await loadIntel();
        };

        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // ---- Render helpers ----
        function stat(val, label, color) {
            return '<div class="stat"><div class="stat-val" style="color:var(' + color + ')">' + val + '</div><div class="stat-lbl">' + label + '</div></div>';
        }

        function matrixCell(cls, title, items, qnum) {
            const isCollapsed = collapseState[cls];
            const showAll = expandState[cls];
            let h = '<div class="matrix-cell ' + cls + '" data-quadrant="' + qnum + '">';
            h += '<div class="matrix-head" data-qid="' + cls + '"><span class="matrix-label">' + title + ' <span class="matrix-toggle' + (isCollapsed ? ' collapsed' : '') + '">\u25BC</span></span><span class="matrix-count">' + items.length + '</span></div>';
            h += '<div class="matrix-items' + (isCollapsed ? ' collapsed' : '') + '">';
            if (items.length === 0) {
                h += '<div class="matrix-empty">No items</div>';
            } else {
                const limit = showAll ? items.length : 6;
                for (const t of items.slice(0, limit)) {
                    const dc = dateClass(t.follow_up_date);
                    h += '<div class="matrix-item" data-id="' + t.id + '">';
                    h += '<span class="matrix-desc" data-id="' + t.id + '">' + esc(t.description) + '</span>';
                    h += '<span class="matrix-owner">' + esc(t.owner || '') + '</span>';
                    if (t.follow_up_date) h += '<span class="matrix-date ' + dc + '">' + t.follow_up_date + '</span>';
                    h += '<span class="matrix-actions">';
                    h += '<button class="act-btn act-done" data-id="' + t.id + '" title="Mark done">\u2713</button>';
                    h += '<button class="act-btn act-del" data-id="' + t.id + '" title="Delete">\u2715</button>';
                    h += '</span>';
                    h += '</div>';
                }
                if (!showAll && items.length > 6) {
                    h += '<div class="show-more" data-qid="' + cls + '">+ ' + (items.length - 6) + ' more \u2014 click to expand</div>';
                }
            }
            h += '</div></div>';
            return h;
        }

        function secHead(t, c) { return '<div class="section-head"><span class="section-title">' + t + '</span><span class="section-count">' + c + '</span></div>'; }

        function fuList(items, cls) {
            let h = '';
            for (const t of items) {
                h += '<div class="fu-row">';
                h += '<span class="fu-date ' + cls + '">' + (t.follow_up_date || '--') + '</span>';
                h += '<span class="fu-desc">' + esc(t.description) + '</span>';
                h += '<span class="fu-owner">' + esc(t.owner || '') + '</span>';
                h += '<button class="fu-action" data-id="' + t.id + '">Done</button>';
                h += '</div>';
            }
            return h;
        }

        function dateClass(d) {
            if (!d) return 'date-ok';
            const today = new Date().toISOString().slice(0, 10);
            if (d < today) return 'date-overdue';
            const week = new Date(Date.now() + 7*86400000).toISOString().slice(0, 10);
            if (d <= week) return 'date-soon';
            return 'date-ok';
        }

        function esc(s) { if (!s) return ''; const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

        loadIntel();
    })();
    </script>
</body>
</html>
