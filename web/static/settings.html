<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS - Settings</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111113;
            --surface-raised: #18181b;
            --border: #27272a;
            --border-subtle: #1e1e21;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.12);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.12);
            --green-text: #4ade80;
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.10);
            --amber-text: #fbbf24;
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.10);
            --purple: #a855f7;
            --purple-dim: rgba(168, 85, 247, 0.10);
            --purple-text: #c084fc;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .shell { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

        header { border-bottom: 1px solid var(--border-subtle); padding: 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 50; }
        .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
        .brand span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
        .nav-links a:hover { color: var(--text-secondary); background: var(--surface); }
        .nav-links a.active { color: var(--text); background: var(--surface-raised); }

        .page-content { padding: 32px 0 64px; }

        .page-title { font-size: 16px; font-weight: 600; }
        .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        .integration-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 24px; }
        @media (max-width: 768px) { .integration-grid { grid-template-columns: 1fr; } }

        .integration-card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 20px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .card-title { font-size: 14px; font-weight: 600; }
        .card-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.green { background: var(--green); }
        .status-dot.red { background: var(--red); }
        .status-dot.amber { background: var(--amber); }
        .status-text-green { color: var(--green-text); }
        .status-text-red { color: var(--red); }
        .status-text-amber { color: var(--amber-text); }
        .card-services { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .loading-text { color: var(--text-muted); font-size: 13px; margin-top: 24px; }

        /* Webhook section */
        .webhook-section { margin-top: 40px; }
        .webhook-card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 20px; }
        .webhook-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .webhook-health { display: flex; align-items: center; gap: 8px; }
        .webhook-dot { width: 10px; height: 10px; border-radius: 50%; }
        .webhook-dot.green { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.4); }
        .webhook-dot.amber { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,.4); }
        .webhook-dot.red { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,.4); }
        .webhook-dot.grey { background: #52525b; }
        .webhook-health-text { font-size: 13px; font-weight: 500; }
        .webhook-meta { font-size: 12px; color: var(--text-muted); margin-top: 10px; }
        .webhook-meta span { margin-right: 16px; }
        .webhook-actions { display: flex; gap: 8px; margin-top: 14px; }
        .webhook-btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--surface-raised); color: var(--text-secondary); transition: all .15s; }
        .webhook-btn:hover { color: var(--text); border-color: var(--text-muted); }
        .webhook-btn.primary { background: var(--accent-dim); color: var(--accent); border-color: transparent; }
        .webhook-btn.primary:hover { background: var(--accent); color: white; }
        .webhook-btn.danger { color: var(--red); }
        .webhook-btn.danger:hover { background: var(--red-dim); border-color: var(--red); }
        .webhook-secret-row { display: flex; gap: 8px; margin-top: 10px; }
        .webhook-secret-row input { flex: 1; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text); outline: none; font-family: 'SF Mono', monospace; }
        .webhook-secret-row input:focus { border-color: var(--accent); }
        .webhook-url { font-family: 'SF Mono', monospace; font-size: 11px; background: var(--surface-raised); border: 1px solid var(--border-subtle); padding: 6px 10px; border-radius: 6px; color: var(--text-secondary); word-break: break-all; margin-top: 10px; }

        /* Scan fallback section */
        .scan-section { margin-top: 40px; }
        .scan-card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 20px; }
        .scan-info-text { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        .scan-actions { display: flex; gap: 8px; align-items: center; }
        .scan-result { font-size: 12px; color: var(--text-muted); margin-left: 12px; }

        /* Memory section */
        .memory-section { margin-top: 40px; }
        .memory-section-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .memory-section-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
        .memory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) { .memory-grid { grid-template-columns: 1fr; } }
        .memory-card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 20px; }
        .memory-card-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .memory-card-title .count { font-size: 11px; color: var(--text-muted); font-weight: 400; }
        .memory-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
        .memory-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .memory-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; gap: 8px; }
        .memory-item-key { color: var(--text-secondary); font-weight: 500; min-width: 80px; }
        .memory-item-val { color: var(--text); flex: 1; word-break: break-word; }
        .memory-item-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        .memory-item-del:hover { color: var(--red); background: var(--red-dim); }
        .note-time { font-size: 11px; color: var(--text-muted); }
        .notes-card { grid-column: 1 / -1; }
        .memory-add-row { display: flex; gap: 8px; margin-top: 12px; }
        .memory-add-row input { flex: 1; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text); outline: none; }
        .memory-add-row input:focus { border-color: var(--accent); }
        .memory-add-row button { background: var(--accent-dim); color: var(--accent); border: 1px solid transparent; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .memory-add-row button:hover { background: var(--accent); color: white; }
        .memory-clear-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer; }
        .memory-clear-btn:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

        .setup-section { margin-top: 40px; }
        .setup-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .setup-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .setup-item { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px 20px; }
        .setup-item-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .setup-item-var { font-size: 12px; color: var(--text-muted); }
        .setup-item-var code { font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace; font-size: 11px; background: var(--surface-raised); border: 1px solid var(--border-subtle); padding: 2px 6px; border-radius: 4px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="shell">
            <div class="header-row">
                <div class="brand">
                    <h1>TARS</h1>
                    <span>Settings</span>
                </div>
                <nav class="nav-links">
                    <a href="/">Voice</a>
                    <a href="/tasks">Tasks</a>
                    <a href="/briefing">Briefing</a>
                    <a href="/executive">Executive</a>
                    <a href="/people">People</a>
                    <a href="/review">Review</a>
                    <a href="/graph">Graph</a>
                    <a href="/settings" class="active">Settings</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="page-content">
        <div class="shell">
            <div class="page-title">Configuration</div>
            <div class="page-subtitle">Integration status and environment variables</div>
            <div id="content">
                <p class="loading-text">Loading...</p>
            </div>

            <div id="webhook-content"></div>

            <div id="scan-content"></div>

            <div id="memory-content"></div>
        </div>
    </div>

    <script>
        function esc(s) { if (!s) return ''; const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

        const DISPLAY_NAMES = {
            microsoft365: 'Microsoft 365',
            notion: 'Notion',
            openai: 'OpenAI',
            anthropic: 'Anthropic',
            telegram: 'Telegram'
        };

        const ENV_VARS = {
            microsoft365: ['MS_CLIENT_ID', 'MS_TENANT_ID'],
            notion: ['NOTION_API_KEY'],
            openai: ['OPENAI_API_KEY'],
            anthropic: ['ANTHROPIC_API_KEY'],
            telegram: ['TELEGRAM_BOT_TOKEN']
        };

        function getStatus(key, info) {
            if (!info.configured) {
                return { dot: 'red', text: 'Not configured', cls: 'status-text-red' };
            }
            if (key === 'microsoft365' && !info.signed_in) {
                return { dot: 'amber', text: 'Needs sign-in', cls: 'status-text-amber' };
            }
            return { dot: 'green', text: 'Connected', cls: 'status-text-green' };
        }

        function renderCard(key, info) {
            const name = DISPLAY_NAMES[key] || key;
            const status = getStatus(key, info);
            const services = (info.services || []).map(s => esc(s)).join(', ');
            return '<div class="integration-card">' +
                '<div class="card-header">' +
                    '<span class="card-title">' + esc(name) + '</span>' +
                    '<span class="card-status">' +
                        '<span class="status-dot ' + status.dot + '"></span>' +
                        '<span class="' + status.cls + '">' + esc(status.text) + '</span>' +
                    '</span>' +
                '</div>' +
                '<div class="card-services">' + services + '</div>' +
            '</div>';
        }

        function renderSetup(data) {
            const unconfigured = Object.keys(data).filter(k => !data[k].configured);
            if (unconfigured.length === 0) return '';

            let items = '';
            unconfigured.forEach(function(key) {
                const name = DISPLAY_NAMES[key] || key;
                const vars = (ENV_VARS[key] || []).map(function(v) {
                    return '<code>' + esc(v) + '</code>';
                }).join(', ');
                items += '<li class="setup-item">' +
                    '<div class="setup-item-name">' + esc(name) + '</div>' +
                    '<div class="setup-item-var">Required: ' + vars + '</div>' +
                '</li>';
            });

            return '<div class="setup-section">' +
                '<div class="setup-title">Setup Guide</div>' +
                '<ul class="setup-list">' + items + '</ul>' +
            '</div>';
        }

        function render(data) {
            let html = '<div class="integration-grid">';
            Object.keys(data).forEach(function(key) {
                html += renderCard(key, data[key]);
            });
            html += '</div>';
            html += renderSetup(data);
            document.getElementById('content').innerHTML = html;
        }

        fetch('/api/settings/status')
            .then(function(r) { return r.json(); })
            .then(render)
            .catch(function(err) {
                document.getElementById('content').innerHTML =
                    '<p class="loading-text">Failed to load settings.</p>';
            });

        /* ── Memory Section ── */
        function renderMemory(mem) {
            var facts = mem.facts || {};
            var prefs = mem.preferences || {};
            var notes = mem.notes || [];
            var fKeys = Object.keys(facts);
            var pKeys = Object.keys(prefs);

            var html = '<div class="memory-section">' +
                '<div style="display:flex;align-items:center;justify-content:space-between">' +
                    '<div><div class="memory-section-title">TARS Memory</div>' +
                    '<div class="memory-section-sub">Persistent facts, preferences, and notes remembered across sessions</div></div>' +
                    '<button class="memory-clear-btn" id="mem-clear">Clear all</button>' +
                '</div>' +
                '<div class="memory-grid">';

            /* Facts card */
            html += '<div class="memory-card"><div class="memory-card-title">Facts <span class="count">' + fKeys.length + '</span></div>';
            if (fKeys.length === 0) {
                html += '<div class="memory-empty">No facts stored yet. Tell TARS your name, role, or timezone.</div>';
            } else {
                html += '<ul class="memory-list">';
                fKeys.forEach(function(k) {
                    html += '<li class="memory-item"><span class="memory-item-key">' + esc(k) + '</span>' +
                        '<span class="memory-item-val">' + esc(facts[k]) + '</span>' +
                        '<button class="memory-item-del" data-type="fact" data-key="' + esc(k) + '" title="Remove">✕</button></li>';
                });
                html += '</ul>';
            }
            html += '<div class="memory-add-row"><input placeholder="Key" id="fact-key"><input placeholder="Value" id="fact-val"><button id="fact-add">Add</button></div>';
            html += '</div>';

            /* Preferences card */
            html += '<div class="memory-card"><div class="memory-card-title">Preferences <span class="count">' + pKeys.length + '</span></div>';
            if (pKeys.length === 0) {
                html += '<div class="memory-empty">No preferences stored yet. Tell TARS how you like responses.</div>';
            } else {
                html += '<ul class="memory-list">';
                pKeys.forEach(function(k) {
                    html += '<li class="memory-item"><span class="memory-item-key">' + esc(k) + '</span>' +
                        '<span class="memory-item-val">' + esc(prefs[k]) + '</span>' +
                        '<button class="memory-item-del" data-type="pref" data-key="' + esc(k) + '" title="Remove">✕</button></li>';
                });
                html += '</ul>';
            }
            html += '<div class="memory-add-row"><input placeholder="Key" id="pref-key"><input placeholder="Value" id="pref-val"><button id="pref-add">Add</button></div>';
            html += '</div>';

            /* Notes card (full width) */
            html += '<div class="memory-card notes-card"><div class="memory-card-title">Notes <span class="count">' + notes.length + '</span></div>';
            if (notes.length === 0) {
                html += '<div class="memory-empty">No notes stored yet. TARS saves important things to remember here.</div>';
            } else {
                html += '<ul class="memory-list">';
                notes.forEach(function(n, i) {
                    var date = n.added_at ? new Date(n.added_at).toLocaleDateString() : '';
                    html += '<li class="memory-item"><span class="memory-item-val">' + esc(n.text) + '</span>' +
                        '<span class="note-time">' + esc(date) + '</span>' +
                        '<button class="memory-item-del" data-type="note" data-idx="' + i + '" title="Remove">✕</button></li>';
                });
                html += '</ul>';
            }
            html += '<div class="memory-add-row"><input placeholder="Add a note..." id="note-text" style="flex:3"><button id="note-add">Add</button></div>';
            html += '</div>';

            html += '</div></div>';
            document.getElementById('memory-content').innerHTML = html;

            /* Bind events */
            document.getElementById('fact-add').onclick = function() {
                var k = document.getElementById('fact-key').value.trim();
                var v = document.getElementById('fact-val').value.trim();
                if (!k || !v) return;
                fetch('/api/memory/fact', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({key: k, value: v}) })
                    .then(function() { loadMemory(); });
            };
            document.getElementById('pref-add').onclick = function() {
                var k = document.getElementById('pref-key').value.trim();
                var v = document.getElementById('pref-val').value.trim();
                if (!k || !v) return;
                fetch('/api/memory/preference', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({key: k, value: v}) })
                    .then(function() { loadMemory(); });
            };
            document.getElementById('note-add').onclick = function() {
                var t = document.getElementById('note-text').value.trim();
                if (!t) return;
                fetch('/api/memory/note', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: t}) })
                    .then(function() { loadMemory(); });
            };
            document.getElementById('mem-clear').onclick = function() {
                if (!confirm('Clear all TARS memory? This cannot be undone.')) return;
                fetch('/api/memory', { method: 'DELETE' }).then(function() { loadMemory(); });
            };
            document.querySelectorAll('.memory-item-del').forEach(function(btn) {
                btn.onclick = function() {
                    var type = btn.dataset.type;
                    if (type === 'note') {
                        fetch('/api/memory/note/' + btn.dataset.idx, { method: 'DELETE' }).then(function() { loadMemory(); });
                    } else if (type === 'fact') {
                        fetch('/api/memory/fact/' + encodeURIComponent(btn.dataset.key), { method: 'DELETE' }).then(function() { loadMemory(); });
                    } else if (type === 'pref') {
                        fetch('/api/memory/preference/' + encodeURIComponent(btn.dataset.key), { method: 'DELETE' }).then(function() { loadMemory(); });
                    }
                };
            });
        }

        function loadMemory() {
            fetch('/api/memory').then(function(r) { return r.json(); }).then(renderMemory)
                .catch(function() {
                    document.getElementById('memory-content').innerHTML =
                        '<div class="memory-section"><div class="memory-section-title">TARS Memory</div><p class="loading-text">Could not load memory.</p></div>';
                });
        }
        loadMemory();

        /* ── Webhook Section ── */
        var _tunnelData = null;

        function renderWebhook(data) {
            var h = data.health || 'disabled';
            var dotCls = h === 'green' ? 'green' : h === 'amber' ? 'amber' : h === 'red' ? 'red' : 'grey';
            var labels = { green: 'Connected — receiving push events', amber: 'Stale — no events in 15+ minutes', red: 'Disconnected — no events in 60+ minutes', waiting: 'Enabled — waiting for first event', disabled: 'Push disabled — using manual pull' };
            var label = labels[h] || h;
            var enabled = data.enabled;

            var tunnelRunning = _tunnelData && _tunnelData.running;
            var webhookUrl = tunnelRunning ? (_tunnelData.webhook_url || _tunnelData.url + '/api/notion/webhook') : window.location.origin + '/api/notion/webhook';

            var html = '<div class="webhook-section" id="webhook"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
                '<div><div class="memory-section-title">Notion Sync</div>' +
                '<div class="memory-section-sub">Push updates from Notion via webhooks, with manual pull as fallback</div></div></div>';

            /* Tunnel status card */
            html += '<div class="webhook-card" style="margin-bottom:12px">' +
                '<div class="webhook-row">' +
                    '<div class="webhook-health">' +
                        '<span class="webhook-dot ' + (tunnelRunning ? 'green' : 'grey') + '"></span>' +
                        '<span class="webhook-health-text">' + (tunnelRunning ? 'Tunnel active' : 'Tunnel not running') + '</span>' +
                    '</div>' +
                '</div>';

            if (tunnelRunning) {
                html += '<div class="webhook-meta"><span>Public URL: ' + esc(_tunnelData.url) + '</span>';
                if (_tunnelData.type) html += '<span>Type: ' + esc(_tunnelData.type) + '</span>';
                html += '</div>';
            } else {
                html += '<div class="webhook-meta">Start a tunnel to get a public URL for Notion webhooks:</div>' +
                    '<div class="webhook-url" style="margin-top:6px;font-size:12px;color:var(--text-secondary)">' +
                        'python -m scripts.tunnel' +
                    '</div>';
            }
            html += '</div>';

            /* Webhook push status card */
            html += '<div class="webhook-card">' +
                '<div class="webhook-row">' +
                    '<div class="webhook-health"><span class="webhook-dot ' + dotCls + '"></span><span class="webhook-health-text">' + esc(label) + '</span></div>' +
                '</div>';

            if (data.events_received) {
                html += '<div class="webhook-meta">';
                html += '<span>Events received: ' + data.events_received + '</span>';
                if (data.last_event_at) html += '<span>Last: ' + new Date(data.last_event_at).toLocaleString() + '</span>';
                if (data.last_event_type) html += '<span>Type: ' + esc(data.last_event_type) + '</span>';
                html += '</div>';
            }
            if (data.last_error) {
                html += '<div class="webhook-meta" style="color:var(--red)">Error: ' + esc(data.last_error) + '</div>';
            }

            html += '<div class="webhook-url">Webhook URL: ' + esc(webhookUrl) + '</div>';

            /* Setup instructions */
            html += '<div class="webhook-meta" style="margin-top:8px">' +
                '1. Start tunnel: <code style="font-size:11px;background:var(--surface-raised);padding:2px 6px;border-radius:3px">python -m scripts.tunnel</code><br>' +
                '2. Copy the Webhook URL above<br>' +
                '3. In Notion: Integration settings → Webhooks → paste the URL<br>' +
                '4. Click "Enable push" below</div>';

            if (!enabled) {
                html += '<div class="webhook-secret-row"><input placeholder="Notion webhook secret (optional)" id="wh-secret"><button class="webhook-btn primary" id="wh-enable">Enable push</button></div>';
            } else {
                html += '<div class="webhook-actions"><button class="webhook-btn danger" id="wh-disable">Disable push</button></div>';
            }

            html += '</div></div>';
            document.getElementById('webhook-content').innerHTML = html;

            if (!enabled) {
                document.getElementById('wh-enable').onclick = function() {
                    var secret = document.getElementById('wh-secret').value.trim();
                    fetch('/api/webhook/enable', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({secret: secret}) })
                        .then(function() { loadWebhook(); });
                };
            } else {
                document.getElementById('wh-disable').onclick = function() {
                    fetch('/api/webhook/disable', { method: 'POST' }).then(function() { loadWebhook(); });
                };
            }
        }

        function loadWebhook() {
            Promise.all([
                fetch('/api/webhook/status').then(function(r) { return r.json(); }),
                fetch('/api/tunnel/status').then(function(r) { return r.json(); }).catch(function() { return { running: false }; })
            ]).then(function(results) {
                _tunnelData = results[1];
                renderWebhook(results[0]);
            }).catch(function() {});
        }
        loadWebhook();

        /* ── Scan Fallback Section ── */
        function renderScan() {
            var html = '<div class="scan-section"><div class="memory-section-title">Manual Scan (Fallback)</div>' +
                '<div class="memory-section-sub" style="margin-bottom:12px">Pull data from Notion manually when push is unavailable</div>' +
                '<div class="scan-card">' +
                '<div class="scan-info-text" id="scan-info">Ready to scan.</div>' +
                '<div class="scan-actions">' +
                    '<button class="webhook-btn primary" id="scan-inc">Incremental Scan</button>' +
                    '<button class="webhook-btn" id="scan-full">Full Scan</button>' +
                    '<span class="scan-result" id="scan-result"></span>' +
                '</div></div></div>';
            document.getElementById('scan-content').innerHTML = html;

            document.getElementById('scan-inc').onclick = function() { doScan(false); };
            document.getElementById('scan-full').onclick = function() { doScan(true); };
        }

        function doScan(full) {
            var btn = full ? document.getElementById('scan-full') : document.getElementById('scan-inc');
            var result = document.getElementById('scan-result');
            btn.disabled = true;
            btn.textContent = 'Scanning...';
            result.textContent = '';
            fetch('/api/intel/scan?full_scan=' + full, { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    btn.disabled = false;
                    btn.textContent = full ? 'Full Scan' : 'Incremental Scan';
                    if (data.error) { result.textContent = 'Error: ' + data.error; result.style.color = 'var(--red)'; }
                    else { result.textContent = 'Done — ' + (data.pages_scanned || 0) + ' pages, ' + (data.new_tasks || 0) + ' new tasks'; result.style.color = 'var(--green-text)'; }
                })
                .catch(function(err) {
                    btn.disabled = false;
                    btn.textContent = full ? 'Full Scan' : 'Incremental Scan';
                    result.textContent = 'Scan failed'; result.style.color = 'var(--red)';
                });
        }

        renderScan();
    </script>
<script src="/static/js/webhook-status.js"></script>
</body>
</html>
